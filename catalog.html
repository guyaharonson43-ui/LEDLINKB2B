  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; scrollbar-gutter: stable; }
    @view-transition { navigation: auto; }
    ::view-transition-old(root), ::view-transition-new(root) { animation-duration: 0.08s; }
    body { background: #F4F4F0; color: #1C1C1C; font-family: 'Heebo', sans-serif; overflow-x: hidden; }
    button, input, select, textarea { font-family: 'Heebo', sans-serif; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #F4F4F0; }
    ::-webkit-scrollbar-thumb { background: #C8C4BC; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #E8A020; }

    .gold-underline {
      border-bottom: 2px solid #E8A020;
      padding-bottom: 2px;
    }

    .tab-active {
      color: #E8A020;
      border-bottom: 2px solid #E8A020;
    }

    .product-card {
      background: #FFFFFF;
      border: 1px solid #E0DDD6;
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      min-height: 320px;
    }
    .product-card:hover {
      border-color: #E8A020;
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton-pulse {
      background: linear-gradient(90deg, #EBEBEB 25%, #F4F4F0 50%, #EBEBEB 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 6px;
    }

    .filter-chip {
      border: 1px solid #D0CCC4;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      color: #666666;
      background: #FFFFFF;
      white-space: nowrap;
    }
    .filter-chip:hover { border-color: #E8A020; color: #E8A020; }
    .filter-chip.active { border-color: #E8A020; color: #FFFFFF; background: #E8A020; }

    .spec-tag {
      background: #F0EDE8;
      border: 1px solid #E0DDD6;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 11px;
      color: #666666;
      display: inline-block;
    }
    .spec-tag.highlight { border-color: rgba(232,160,32,0.5); color: #C4880A; background: rgba(232,160,32,0.08); }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      backdrop-filter: blur(4px);
    }
    .modal-box {
      background: #FFFFFF;
      border: 1px solid #E0DDD6;
      border-radius: 14px;
      width: 100%; max-width: 680px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,0.15);
    }

    .btn-gold {
      background: #E8A020;
      color: #FFFFFF;
      font-weight: 700;
      border-radius: 8px;
      padding: 10px 20px;
      transition: background 0.15s;
      border: none;
      cursor: pointer;
      display: inline-block;
      text-align: center;
    }
    .btn-gold:hover { background: #C4880A; }

    .btn-outline {
      border: 1px solid #D0CCC4;
      color: #555555;
      font-weight: 600;
      border-radius: 8px;
      padding: 9px 18px;
      transition: all 0.15s;
      background: transparent;
      cursor: pointer;
      display: inline-block;
      text-align: center;
    }
    .btn-outline:hover { border-color: #E8A020; color: #E8A020; }

    .search-input {
      background: #FFFFFF;
      border: 1px solid #D0CCC4;
      border-radius: 8px;
      color: #1C1C1C;
      padding: 10px 40px 10px 16px;
      font-family: 'Heebo', sans-serif;
      font-size: 14px;
      width: 100%;
      transition: border-color 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .search-input:focus { outline: none; border-color: #E8A020; }
    .search-input::placeholder { color: #AAAAAA; }

    .no-img-placeholder {
      width: 100%; padding-top: 65%;
      background: linear-gradient(135deg, #F0EDE8 0%, #ECEAE4 100%);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    .nav-drop-item {
      display: block; padding: 10px 20px;
      color: #AAAAAA; text-decoration: none;
      font-size: 14px; font-weight: 500;
      border-right: 2px solid transparent;
      transition: all 0.15s; background: transparent;
      width: 100%; text-align: right; cursor: pointer;
      font-family: 'Heebo', sans-serif; box-sizing: border-box;
      border-top: none; border-bottom: none; border-left: none;
    }
    .nav-drop-item:hover { color: #E8A020; background: rgba(255,255,255,0.04); border-right-color: #E8A020; }

    .catalog-layout { display: grid; gap: 40px; align-items: start; }
    .catalog-layout.with-sidebar { grid-template-columns: 240px 1fr; }
    .catalog-layout.no-sidebar   { grid-template-columns: 1fr; }

    /* ── Hamburger / Mobile Drawer ── */
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 8px; flex-direction: column; justify-content: center; gap: 5px; }
    .hamburger-line { display: block; width: 22px; height: 2px; background: #fff; border-radius: 1px; transition: transform 0.25s, opacity 0.25s; }
    .hamburger.open .hamburger-line:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.open .hamburger-line:nth-child(2) { opacity: 0; }
    .hamburger.open .hamburger-line:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
    .mm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 149; }
    .mm-overlay.open { display: block; }
    .mobile-menu { position: fixed; top: 0; right: 0; bottom: 0; width: 280px; background: #1A1A1A; border-left: 1px solid #2A2A2A; z-index: 150; overflow-y: auto; transform: translateX(110%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); box-shadow: -12px 0 40px rgba(0,0,0,0.6); }
    .mobile-menu.open { transform: translateX(0); }
    .mm-header { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 64px; border-bottom: 1px solid #222; }
    .mm-close { background: none; border: none; cursor: pointer; color: #666; font-size: 22px; line-height: 1; padding: 4px; transition: color 0.15s; }
    .mm-close:hover { color: #fff; }
    .mm-link { display: block; padding: 13px 24px; color: #AAAAAA; text-decoration: none; font-size: 15px; font-weight: 500; border-right: 3px solid transparent; transition: all 0.15s; cursor: pointer; }
    .mm-link:hover { color: #E8A020; border-right-color: #E8A020; background: rgba(255,255,255,0.04); }
    .mm-link.sub { padding-right: 40px; font-size: 13px; color: #777; }
    .mm-link.active { color: #E8A020; background: rgba(232,160,32,0.07); }
    .mm-label { font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #444; padding: 16px 24px 4px; }
    .mm-divider { height: 1px; background: #252525; margin: 8px 0; }

    @media (max-width: 768px) {
      .sidebar-mobile-hidden { display: none; }
      .catalog-layout.with-sidebar { grid-template-columns: 1fr; }
    }
    @media (max-width: 900px) {
      .nav-desktop-links { display: none !important; }
      .hamburger { display: flex; }
    }
    .products-grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    @media (max-width: 600px) {
      .catalog-content-pad { padding: 24px 16px !important; }
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .tab-button { padding: 12px 14px !important; gap: 4px !important; font-size: 13px !important; }
    }

    .pulse-gold {
      animation: pulseGold 2s infinite;
    }
    @keyframes pulseGold {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .footer { background: #111; padding: 48px 32px 0; border-top: 1px solid #222; }
    .footer-inner { max-width: 1200px; margin: 0 auto; }
    .footer-top { display: grid; grid-template-columns: 1.6fr 1fr 1fr 1fr; gap: 48px; padding-bottom: 40px; border-bottom: 1px solid #1E1E1E; }
    .footer-logo-led { font-size: 24px; font-weight: 900; color: #E8A020; }
    .footer-logo-link { font-size: 24px; font-weight: 300; color: #fff; }
    .footer-tagline { font-size: 13px; color: #555; margin-top: 10px; line-height: 1.6; max-width: 220px; }
    .footer-col-title { font-size: 11px; font-weight: 700; color: #555; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 18px; }
    .footer-links { display: flex; flex-direction: column; gap: 12px; }
    .footer-link { color: #888; text-decoration: none; font-size: 14px; transition: color 0.15s; display: flex; align-items: center; gap: 9px; }
    .footer-link:hover { color: #E8A020; }
    .footer-link svg { flex-shrink: 0; opacity: 0.5; transition: opacity 0.15s; }
    .footer-link:hover svg { opacity: 1; }
    .footer-hours-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #888; gap: 12px; }
    .footer-hours-row + .footer-hours-row { margin-top: 12px; }
    .hours-open { color: #4CAF50; font-size: 12px; font-weight: 600; }
    .hours-closed { color: #555; font-size: 12px; font-weight: 600; }
    .footer-bottom { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; padding: 20px 0; }
    .footer-copy { font-size: 12px; color: #3A3A3A; }
    .footer-legal { display: flex; flex-wrap: wrap; gap: 6px 20px; }
    .footer-legal a { font-size: 12px; color: #3A3A3A; text-decoration: none; transition: color 0.15s; }
    .footer-legal a:hover { color: #E8A020; }
    @media (max-width: 768px) { .footer-top { grid-template-columns: 1fr 1fr; gap: 32px; } }
    @media (max-width: 480px) { .footer-top { grid-template-columns: 1fr; } }

    /* ── Profile Configurator Modal ── */
    .cfg-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:2000;display:flex;align-items:flex-start;justify-content:center;padding:16px;padding-top:max(16px,env(safe-area-inset-top));backdrop-filter:blur(6px);overflow-y:auto; }
    .cfg-card { width:100%;max-width:min(700px,calc(100vw - 32px));background:#FFFFFF;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,0.15);overflow:hidden;border:1px solid #E0DDD6;font-family:'Heebo',sans-serif;margin:auto; }
    .cfg-header { text-align:center;padding:22px;border-bottom:1px solid #E0DDD6;background:#F8F7F4; }
    .cfg-header h2 { margin:0;color:#1C1C1C;font-size:20px;font-weight:900; }
    .cfg-header p  { margin:4px 0 0;font-size:10px;color:#777777;text-transform:uppercase;letter-spacing:2px; }
    .cfg-step { padding:22px;display:none; }
    .cfg-step.active { display:block;animation:cfgFade .25s ease; }
    @keyframes cfgFade { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .cfg-step-title { font-size:18px;font-weight:800;margin-bottom:18px;text-align:center;color:#1C1C1C; }
    .cfg-grid-2 { display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px; }
    .cfg-opt { background:#F8F7F4;border:2px solid #E0DDD6;border-radius:14px;padding:18px;text-align:center;cursor:pointer;transition:.18s;color:#1C1C1C;font-size:15px;font-weight:600; }
    .cfg-opt:hover { background:#F0EDE8;border-color:#C8C4BE; }
    .cfg-opt.selected { border-color:#E8A020;background:rgba(232,160,32,.08); }
    .cfg-opt-icon { font-size:28px;margin-bottom:8px;display:block; }
    .cfg-canvas-wrap { position:relative;width:100%;height:360px;background:#0b1120;border-radius:14px;border:1px solid #E0DDD6;overflow:hidden; }
    @media (max-width:480px) { .cfg-canvas-wrap { height:270px; } }
    .cfg-canvas-wrap canvas { display:block;width:100%;height:100%;touch-action:none;cursor:crosshair; }
    .cfg-ui-layer { position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10; }
    .cfg-tools { position:absolute;top:10px;left:10px;display:flex;gap:8px;z-index:20; }
    .cfg-tool-btn { background:#F0EDE8;color:#1C1C1C;border:1px solid #E0DDD6;padding:7px 10px;border-radius:7px;font-size:11px;cursor:pointer;transition:.2s;display:none;font-family:'Heebo',sans-serif; }
    .cfg-tool-btn:hover { background:#E8E4DE; }
    .cfg-status { position:absolute;top:12px;right:12px;font-size:10px;color:#94a3b8;background:rgba(0,0,0,.5);padding:3px 8px;border-radius:8px;pointer-events:none; }
    .cfg-measure-input { position:absolute;transform:translate(-50%,-50%) scale(0.75);transform-origin:center;width:88px;padding:7px;text-align:center;font-weight:700;border:2px solid #E8A020;border-radius:7px;background:#fff;color:#000;font-size:16px;outline:none;pointer-events:auto;z-index:15;font-family:'Heebo',sans-serif; }
    .cfg-seg-hit { position:absolute;height:40px;transform-origin:0 50%;pointer-events:auto;cursor:pointer; }
    .cfg-nav { display:flex;gap:10px;margin-top:20px; }
    .cfg-btn { flex:1;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:.18s;font-family:'Heebo',sans-serif; }
    .cfg-btn-prev { background:#F0EDE8;color:#1C1C1C;border:1px solid #E0DDD6; } .cfg-btn-prev:hover { background:#E8E4DE; }
    .cfg-btn-next { background:#E8A020;color:#111; } .cfg-btn-next:hover { background:#C4880A; }
    .cfg-label { display:block;margin-bottom:6px;font-size:11px;color:#777777; }
    .cfg-bom-box { background:#F8F7F4;border-radius:14px;padding:18px;border:1px solid #E0DDD6;margin-top:18px; }
    .cfg-bom-item { display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #E0DDD6;font-size:13px;color:#1C1C1C; }
    .cfg-bom-val { font-weight:700;color:#E8A020;font-family:monospace; }
    .cfg-snapshot { width:100%;height:160px;background:#0b1120;border-radius:10px;margin-top:12px;border:1px solid #E0DDD6;object-fit:contain; }
    .cfg-btn-wa { display:block;background:#25D366;color:#fff;text-align:center;padding:14px;border-radius:10px;font-weight:700;font-size:17px;text-decoration:none;margin-top:14px;transition:background .15s;font-family:'Heebo',sans-serif; }
    .cfg-btn-wa:hover { background:#1da854; }
    .cfg-btn-dl { width:100%;background:#F8F7F4;color:#1C1C1C;margin-top:8px;padding:9px;border-radius:7px;border:1px dashed #E8A020;cursor:pointer;font-size:12px;font-family:'Heebo',sans-serif;transition:background .15s; }
    .cfg-btn-dl:hover { background:#F0EDE8; }
    .cfg-close-btn { position:absolute;top:-14px;left:-14px;width:34px;height:34px;background:#FFFFFF;border:1px solid #E0DDD6;color:#888;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:5;transition:all .15s;line-height:1; }
    .cfg-close-btn:hover { color:#1C1C1C;border-color:#E8A020; }

    const NEON_ID_MAP = {
      'ledlink-neon-top':     'h-top',

      'ledlink-neon-rgb':     'h-top',
      'qlt-n2412b0rg':        'l-side',
      'qlt-n2412b1rg':        'l-side',
      'qlt-n2412f':           'f-front',
      'qlt-n2412l':           'l-side',
      'qlt-n2414h0rg':        'h-top',
      'qlt-n2414h1':          'h-top',
      'qlt-n2414h1rg':        'h-top',
      'qlt-n2416h':           'h-top',
      'qlt-n3x8-mini-neon':   'mini-3x8',
      'qlt-n4x10':            '4x10',
      'qlt-n4x10t':           '4x10',
      'qlt-n3x8':             '8x8',
      'qlt-np2436834':        'double',
      'qlt-nt1811-360-strip-neon-led-tube': 'tube-18',
      'qlt-nt2314-360-strip-neon-led-tube': 'tube-23',

    window.NeonSchematic = function NeonSchematic({ product }) {

                <button onClick={() => setOpen(false)}
                  style={{position:'absolute',top:12,left:16,background:'none',border:'none',

                <div style={{fontSize:11,color:'#999999',letterSpacing:2,textTransform:'uppercase',marginBottom:16}}>חתך רוחב</div>

  </script>
  <!-- ── Configurator: vanilla JS ── -->
  <script>
  window.initConfigurator = function(rootEl, onCloseFn) {
    // 1. Inject HTML structure
    rootEl.innerHTML = `
      <div class="cfg-card">
        <div class="cfg-header">
          <button class="cfg-hdr-close" id="cfg-hdr-close" aria-label="סגור">✕</button>
          <h2>LEDLink Configurator</h2>
          <p>תכנון הנדסי וייצור בהתאמה אישית</p>
        </div>
        <!-- Step 1: Template -->
        <div class="cfg-step active" id="cfg-step-1">
          <div class="cfg-step-title">בחר צורת התחלה</div>
          <div class="cfg-grid-2">
            <div class="cfg-opt" id="cfg-tpl-I"><span class="cfg-opt-icon">➖</span>קו ישר</div>

            <div class="cfg-opt" id="cfg-tpl-U"><span class="cfg-opt-icon"><svg width="28" height="28" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 5 L5 27 L27 27 L27 5"/></svg></span>צורת ח'</div>
            <div class="cfg-opt" id="cfg-tpl-FREE"><span class="cfg-opt-icon">✏️</span>שרטוט חופשי</div>

        <!-- Step 2: Canvas -->
        <div class="cfg-step" id="cfg-step-2">
          <div class="cfg-step-title">הגדר מידות והזנה</div>
          <div class="cfg-canvas-wrap" id="cfg-container">
            <div class="cfg-status" id="cfg-status"></div>
            <div class="cfg-tools">
              <button class="cfg-tool-btn" id="cfg-tool-rotate">🔄 סובב</button>
              <button class="cfg-tool-btn" id="cfg-tool-clear">🗑️ נקה</button>
            </div>
            <canvas id="cfg-canvas"></canvas>
            <div class="cfg-ui-layer" id="cfg-ui-layer"></div>

          <div class="cfg-nav">

            <button class="cfg-btn cfg-btn-next" id="cfg-next-2">המשך לעיצוב ◀</button>
          </div>
        </div>
        <!-- Step 3: Design -->
        <div class="cfg-step" id="cfg-step-3">
          <div class="cfg-step-title">חתימת אור וגימור</div>
          <span class="cfg-label">צבע פרופיל:</span>
          <div class="cfg-grid-2">
            <div class="cfg-opt selected" id="cfg-c-BLK">שחור מט</div>
            <div class="cfg-opt" id="cfg-c-WHT">לבן מט</div>
          </div>
          <span class="cfg-label">גוון אור (CCT):</span>
          <div class="cfg-grid-2">
            <div class="cfg-opt selected" id="cfg-k-3000">חם 3000K</div>
            <div class="cfg-opt" id="cfg-k-4000">טבעי 4000K</div>
          </div>
          <span class="cfg-label">ייעוד התאורה:</span>
          <div class="cfg-grid-2">
            <div class="cfg-opt selected" id="cfg-lighting-central">מרכזית (30W/m)</div>
            <div class="cfg-opt" id="cfg-lighting-mood">אווירה (10W/m)</div>
          </div>
          <span class="cfg-label">אופן התקנה:</span>
          <div class="cfg-grid-2">
            <div class="cfg-opt selected" id="cfg-install-recessed">שקוע גבס</div>
            <div class="cfg-opt" id="cfg-install-surface">צמוד / תלוי</div>
          </div>
          <div class="cfg-nav">
            <button class="cfg-btn cfg-btn-prev" id="cfg-back-2">▶ חזור לשרטוט</button>
            <button class="cfg-btn cfg-btn-next" id="cfg-next-3">סיים וחשב BOM ◀</button>
          </div>
        </div>
        <!-- Step 4: BOM -->
        <div class="cfg-step" id="cfg-step-4">
          <div class="cfg-step-title" style="color:#E8A020">מפרט מוכן לייצור!</div>
          <img id="cfg-snapshot" class="cfg-snapshot" alt="שרטוט טכני">
          <button class="cfg-btn-dl" id="cfg-dl-btn">💾 הורד שרטוט (צרף לווטסאפ)</button>
          <div class="cfg-bom-box" id="cfg-bom"></div>
          <button id="cfg-wa-link" class="cfg-btn-wa">💬 שלח תכנון, נחזור אליך</button>
          <div class="cfg-nav" style="margin-top:14px">
            <button class="cfg-btn cfg-btn-prev" id="cfg-back-3">חזור לעריכה</button>
            <button class="cfg-btn" style="background:#F0EDE8;color:#1C1C1C;border:1px solid #E0DDD6" id="cfg-restart">תכנן חדש</button>
          </div>
        </div>
      </div>`;

    // 2. DOM refs
    rootEl.querySelector('#cfg-hdr-close').onclick = onCloseFn;
    var canvas     = rootEl.querySelector('#cfg-canvas');
    var ctx        = canvas.getContext('2d');
    var uiLayer    = rootEl.querySelector('#cfg-ui-layer');
    var statusEl   = rootEl.querySelector('#cfg-status');
    var container  = rootEl.querySelector('#cfg-container');
    var toolRotate = rootEl.querySelector('#cfg-tool-rotate');
    var toolClear  = rootEl.querySelector('#cfg-tool-clear');

    // 3. State
    var state = { mode:'I', vertices:[], feedIndex:0, feedSelected:false, inputs:[], color:'BLK', cct:'3000K', lightingType:'מרכזית', installType:'שקוע', locked:false };

    // 4. Helpers
    function goToStep(n, silent) {
      rootEl.querySelectorAll('.cfg-step').forEach(function(p){ p.classList.remove('active'); });
      rootEl.querySelector('#cfg-step-'+n).classList.add('active');
      if (n === 2) resize();
      if(!silent) history.pushState({cfgStep: n}, '');
      var overlay = rootEl.closest('.cfg-overlay');
      if(overlay) overlay.scrollTop = 0;
    }
    history.pushState({cfgStep: 1}, '');
    function onPopState() {
      var active = rootEl.querySelector('.cfg-step.active');
      if(!active) { window.removeEventListener('popstate', onPopState); return; }
      var n = parseInt(active.id.replace('cfg-step-', ''));
      if(n > 1) {
        goToStep(n - 1, true);
      } else {
        window.removeEventListener('popstate', onPopState);
        onCloseFn();
      }
    }
    window.addEventListener('popstate', onPopState);

    function resize() {
      canvas.width  = container.clientWidth;
      canvas.height = container.clientHeight;
      if (state.vertices.length) redrawCanvas();
    }

    function recenterShape() {
      if (!state.vertices.length) return;
      var xs = state.vertices.map(function(v){return v.x;}), ys = state.vertices.map(function(v){return v.y;});
      var minX=Math.min.apply(null,xs), maxX=Math.max.apply(null,xs);
      var minY=Math.min.apply(null,ys), maxY=Math.max.apply(null,ys);
      var offX=(canvas.width/2)-(minX+maxX)/2, offY=(canvas.height/2)-(minY+maxY)/2;
      state.vertices.forEach(function(v){ v.x+=offX; v.y+=offY; });
    }

    function injectTemplate(t) {
      var cx=canvas.width/2, cy=canvas.height/2;
      if(t==='I') state.vertices=[{x:cx-150,y:cy},{x:cx+150,y:cy}];
      if(t==='L') state.vertices=[{x:cx-100,y:cy-100},{x:cx-100,y:cy+100},{x:cx+100,y:cy+100}];
      if(t==='U') state.vertices=[{x:cx-100,y:cy-100},{x:cx-100,y:cy+100},{x:cx+100,y:cy+100},{x:cx+100,y:cy-100}];
      recenterShape(); redrawCanvas();
    }

    function rotateShape() {
      if (!state.vertices.length) return;
      var xs=state.vertices.map(function(v){return v.x;}), ys=state.vertices.map(function(v){return v.y;});
      var cx=(Math.min.apply(null,xs)+Math.max.apply(null,xs))/2;
      var cy=(Math.min.apply(null,ys)+Math.max.apply(null,ys))/2;
      state.vertices = state.vertices.map(function(v){
        var dx=v.x-cx, dy=v.y-cy; return {x:cx-dy,y:cy+dx};
      });
      recenterShape(); redrawCanvas();
    }

    function selectTemplate(t) {
      state.mode=t; state.locked=(t!=='FREE'); state.inputs=[]; state.feedIndex=0;
      state.feedSelected=(t==='I');
      goToStep(2);
      setTimeout(function(){
        resize();
        if(t==='FREE'){
          state.vertices=[]; toolRotate.style.display='none'; toolClear.style.display='none';
          statusEl.innerText='צייר כעת...'; redrawCanvas();
        } else {
          toolRotate.style.display='block'; toolClear.style.display='none';
          injectTemplate(t); statusEl.innerText='';
        }
      }, 60);
    }

    function redrawCanvas() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      uiLayer.innerHTML='';

      // Centroid — for pushing labels outside the shape
      var cx=0, cy=0;
      state.vertices.forEach(function(v){ cx+=v.x; cy+=v.y; });
      if(state.vertices.length) { cx/=state.vertices.length; cy/=state.vertices.length; }

      for (var i=0; i<state.vertices.length-1; i++) {
        var p1=state.vertices[i], p2=state.vertices[i+1];
        var isFeed = state.feedSelected && i===state.feedIndex;
        ctx.beginPath(); ctx.lineWidth=14; ctx.lineCap='square';
        ctx.strokeStyle = isFeed ? '#E8A020' : '#FFFFFF';
        ctx.shadowBlur  = isFeed ? 20 : 0;
        ctx.shadowColor = '#E8A020';
        ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
        ctx.shadowBlur=0;
        var midX=(p1.x+p2.x)/2, midY=(p1.y+p2.y)/2;
        var len=Math.hypot(p2.x-p1.x,p2.y-p1.y);
        var ang=Math.atan2(p2.y-p1.y,p2.x-p1.x);
        // Hit area for feed selection
        var hit=document.createElement('div'); hit.className='cfg-seg-hit';
        hit.style.width=len+'px'; hit.style.left=p1.x+'px'; hit.style.top=(p1.y-20)+'px';
        hit.style.transform='rotate('+ang+'rad)';
        (function(idx){ hit.onclick=function(){ state.feedIndex=idx; state.feedSelected=true; redrawCanvas(); }; })(i);
        uiLayer.appendChild(hit);
        // Measure input — positioned outside the shape
        var OFF=20;
        var isH=Math.abs(p2.x-p1.x)>Math.abs(p2.y-p1.y);
        var inp=document.createElement('input'); inp.type='number'; inp.className='cfg-measure-input';
        inp.placeholder='ס"מ';
        if(isH){
          var pushUp=(midY<=cy);
          inp.style.left=midX+'px';
          inp.style.top=(pushUp ? midY-OFF : midY+OFF)+'px';
          // center X; push fully above (bottom edge at anchor) or below (top edge at anchor)
          inp.style.transform=pushUp ? 'translate(-50%,-100%)' : 'translate(-50%,0%)';
        } else {
          var pushRight=(midX>=cx);
          inp.style.left=(pushRight ? midX+OFF : midX-OFF)+'px';
          inp.style.top=midY+'px';
          // center Y; push fully right (left edge at anchor) or left (right edge at anchor)
          inp.style.transform=pushRight ? 'translate(0%,-50%)' : 'translate(-100%,-50%)';
        }
        inp.value = state.inputs[i]||'';
        (function(idx, el){ el.oninput=function(){ el.style.borderColor='#E8A020'; state.inputs[idx]=el.value; }; })(i,inp);
        uiLayer.appendChild(inp);
      }
    }

    // Freehand drawing
    var isDrawing=false, rawPoints=[];
    function onPointerDown(e) {
      if(state.locked) return;
      isDrawing=true; rawPoints=[];
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.beginPath(); ctx.lineWidth=4; ctx.strokeStyle='rgba(255,255,255,0.4)';
    }
    function onPointerMove(e) {
      if(!isDrawing) return;
      var rect=canvas.getBoundingClientRect();
      var pt={x:e.clientX-rect.left,y:e.clientY-rect.top};
      rawPoints.push(pt);
      if(rawPoints.length===1) ctx.moveTo(pt.x,pt.y); else ctx.lineTo(pt.x,pt.y);
      ctx.stroke();
    }
    function onPointerUp() {
      if(!isDrawing) return; isDrawing=false;
      if(rawPoints.length>5) processFreehand();
    }
    canvas.addEventListener('pointerdown', onPointerDown);
    canvas.addEventListener('pointermove', onPointerMove);
    canvas.addEventListener('pointerup',   onPointerUp);

    function rdp(p,e) {
      if(p.length<3) return p;
      var maxD=0, idx=0;
      for(var i=1;i<p.length-1;i++){
        var d=Math.abs((p[p.length-1].y-p[0].y)*p[i].x-(p[p.length-1].x-p[0].x)*p[i].y+p[p.length-1].x*p[0].y-p[p.length-1].y*p[0].x)/Math.hypot(p[p.length-1].y-p[0].y,p[p.length-1].x-p[0].x);
        if(d>maxD){maxD=d;idx=i;}
      }
      if(maxD>e) return rdp(p.slice(0,idx+1),e).slice(0,-1).concat(rdp(p.slice(idx),e));
      return [p[0],p[p.length-1]];
    }

    function processFreehand() {
      var simplified=rdp(rawPoints,40);
      if(simplified.length<2) return;
      // 1. יישור ל-90 מעלות
      var ortho=[simplified[0]];
      for(var i=1;i<simplified.length;i++){
        var p1=ortho[ortho.length-1], p2=simplified[i];
        if(Math.abs(p2.x-p1.x)>Math.abs(p2.y-p1.y)) ortho.push({x:p2.x,y:p1.y});
        else ortho.push({x:p1.x,y:p2.y});
      }
      // 2. סגירה מגנטית + תיקון הפינה שלפני הסגירה
      if(ortho.length>2&&Math.hypot(ortho[ortho.length-1].x-ortho[0].x,ortho[ortho.length-1].y-ortho[0].y)<90){
        ortho[ortho.length-1]={x:ortho[0].x,y:ortho[0].y};
        var prev=ortho[ortho.length-2];
        if(Math.abs(ortho[ortho.length-3].y-prev.y)<5) prev.x=ortho[0].x;
        else prev.y=ortho[0].y;
      }
      // 3. הלחמת צלעות קולינאריות (מונע חלוניות מידה כפולות)
      var clean=[ortho[0]];
      for(var j=1;j<ortho.length;j++){
        var prev=clean[clean.length-1], curr=ortho[j];
        if(Math.hypot(curr.x-prev.x,curr.y-prev.y)<5) continue;
        if(clean.length>1){
          var pPrev=clean[clean.length-2];
          var isHoriz=Math.abs(prev.y-pPrev.y)<2&&Math.abs(curr.y-prev.y)<2;
          var isVert=Math.abs(prev.x-pPrev.x)<2&&Math.abs(curr.x-prev.x)<2;
          if(isHoriz||isVert){ clean[clean.length-1]=curr; continue; }
        }
        clean.push(curr);
      }
      // 4. בדיקת איחוד בצומת הסגירה
      if(clean.length>3&&clean[0].x===clean[clean.length-1].x&&clean[0].y===clean[clean.length-1].y){
        var pFirst=clean[1], pLast=clean[clean.length-2];
        var isHoriz=Math.abs(clean[0].y-pFirst.y)<2&&Math.abs(clean[0].y-pLast.y)<2;
        var isVert=Math.abs(clean[0].x-pFirst.x)<2&&Math.abs(clean[0].x-pLast.x)<2;
        if(isHoriz||isVert){ clean[0]=pLast; clean.pop(); clean[clean.length-1]=pLast; }
      }
      state.vertices=clean; state.locked=true;
      state.feedSelected=(state.vertices.length-1===1);
      toolRotate.style.display='block'; toolClear.style.display='block'; statusEl.innerText='';
      recenterShape(); redrawCanvas();
    }

    function validateAndProceed() {
      if(!state.vertices.length){ alert('נא לשרטוט או לבחור צורה'); return; }
      var missing=false;
      var inputs=uiLayer.querySelectorAll('input');
      for(var i=0;i<state.vertices.length-1;i++){
        if(!state.inputs[i]||Number(state.inputs[i])<=0){
          missing=true; if(inputs[i]) inputs[i].style.borderColor='#ef4444';
        }
      }
      if(missing){ alert('שגיאה: נא להזין מידה תקינה לכל הצלעות'); return; }
      if((state.vertices.length-1)>1&&!state.feedSelected){ alert('נא ללחוץ על הצלע שממנה תהיה ההזנה (תסומן בזהב)'); return; }
      goToStep(3);
    }

    function buildExportCanvas() {
      var cw=canvas.width, ch=canvas.height;
      var HDR=54, FTR=34;
      var oc=document.createElement('canvas'); oc.width=cw; oc.height=ch+HDR+FTR;
      var ox=oc.getContext('2d');

      // ── HEADER (dark bar) ──
      ox.fillStyle='#1C1C1C'; ox.fillRect(0,0,cw,HDR);
      // Logo: LED (gold bold) + LINK (white light)
      ox.textBaseline='middle'; ox.textAlign='right';
      ox.font='900 18px Heebo,sans-serif'; ox.fillStyle='#E8A020';
      ox.fillText('LED', cw-14, HDR/2);
      var ledW=ox.measureText('LED').width;
      ox.font='300 18px Heebo,sans-serif'; ox.fillStyle='#FFFFFF';
      ox.fillText('LINK', cw-14-ledW, HDR/2);
      // Subtitle
      ox.font='12px Heebo,sans-serif'; ox.fillStyle='#666'; ox.textAlign='left';
      ox.fillText('תכנון פרופיל LED אישי', 14, HDR/2);
      // Gold bottom line
      ox.fillStyle='#E8A020'; ox.fillRect(0,HDR-2,cw,2);

      // ── DRAWING AREA (white) ──
      ox.fillStyle='#FFFFFF'; ox.fillRect(0,HDR,cw,ch);

      // Subtle grid
      ox.strokeStyle='rgba(224,221,214,0.5)'; ox.lineWidth=0.5;
      for(var gx=0;gx<cw;gx+=30){ ox.beginPath(); ox.moveTo(gx,HDR); ox.lineTo(gx,HDR+ch); ox.stroke(); }
      for(var gy=0;gy<ch;gy+=30){ ox.beginPath(); ox.moveTo(0,HDR+gy); ox.lineTo(cw,HDR+gy); ox.stroke(); }

      // Centroid of shape (in original canvas coords, without HDR)
      var cx=0, cy=0;
      state.vertices.forEach(function(v){ cx+=v.x; cy+=v.y; });
      cx/=state.vertices.length; cy/=state.vertices.length;

      // Segments
      for(var i=0;i<state.vertices.length-1;i++){
        var p1=state.vertices[i], p2=state.vertices[i+1];
        var isFeed=state.feedSelected&&i===state.feedIndex;
        var x1=p1.x, y1=p1.y+HDR, x2=p2.x, y2=p2.y+HDR;
        // Strip line
        ox.beginPath(); ox.lineWidth=10; ox.lineCap='square';
        ox.strokeStyle=isFeed?'#E8A020':'#1C1C1C';
        ox.moveTo(x1,y1); ox.lineTo(x2,y2); ox.stroke();
        // Feed label
        if(isFeed){
          var fx=(x1+x2)/2, fy=(y1+y2)/2;
          ox.font='bold 10px Heebo,sans-serif'; ox.textAlign='center'; ox.textBaseline='middle';
          ox.fillStyle='#E8A020'; ox.fillText('⚡ הזנה', fx, fy+18);
        }
        // Dimension label — pushed outward from centroid
        if(state.inputs[i]){
          var OFF=26;
          var smx=(p1.x+p2.x)/2, smy=(p1.y+p2.y)/2; // midpoint in original coords
          var isH=Math.abs(p2.x-p1.x)>Math.abs(p2.y-p1.y);
          var lx, ly;
          if(isH){
            lx=(x1+x2)/2;
            // above midpoint when midpoint is above/at centroid, else below
            ly=(smy<=cy ? (smy+HDR)-OFF : (smy+HDR)+OFF);
          } else {
            // right of midpoint when midpoint is right of/at centroid, else left
            lx=(smx>=cx ? smx+OFF : smx-OFF);
            ly=(y1+y2)/2;
          }
          var text=state.inputs[i]+' ס"מ';
          ox.font='bold 11px Heebo,sans-serif'; ox.textAlign='center'; ox.textBaseline='middle';
          var tw=ox.measureText(text).width;
          ox.fillStyle='#F4F4F0'; ox.fillRect(lx-tw/2-5,ly-8,tw+10,16);
          ox.strokeStyle='#E0DDD6'; ox.lineWidth=1; ox.strokeRect(lx-tw/2-5,ly-8,tw+10,16);
          ox.fillStyle='#1C1C1C'; ox.fillText(text,lx,ly);
        }
      }
      // Corner dots
      state.vertices.forEach(function(v){
        ox.beginPath(); ox.arc(v.x,v.y+HDR,4,0,Math.PI*2);
        ox.fillStyle='#E8A020'; ox.fill();
        ox.strokeStyle='#1C1C1C'; ox.lineWidth=1.5; ox.stroke();
      });

      // ── FOOTER ──
      ox.fillStyle='#E8A020'; ox.fillRect(0,HDR+ch,cw,2);
      ox.fillStyle='#F4F4F0'; ox.fillRect(0,HDR+ch+2,cw,FTR-2);
      ox.font='10px Heebo,sans-serif'; ox.textAlign='center'; ox.textBaseline='middle';
      ox.fillStyle='#666';
      ox.fillText(state.installType+' · '+state.lightingType+' · '+state.cct+' · '+state.color, cw/2, HDR+ch+2+(FTR-2)/2);

      return oc;
    }

    function captureCanvas() {
      rootEl.querySelector('#cfg-snapshot').src=buildExportCanvas().toDataURL('image/png');
    }

    function downloadSnapshot() {
      var link=document.createElement('a');
      link.download='LEDLink-Drawing-'+Date.now()+'.png';
      link.href=buildExportCanvas().toDataURL('image/png'); link.click();
    }

    function generateFinalBOM() {
      captureCanvas();
      var totalCM=0; state.inputs.forEach(function(v){ totalCM+=Number(v||0); });
      var totalM=totalCM/100;
      var corners=state.vertices.length-2;
      var first=state.vertices[0], last=state.vertices[state.vertices.length-1];
      if(state.vertices.length>1&&first.x===last.x&&first.y===last.y) corners+=1;
      var wpm=(state.lightingType==='מרכזית')?30:10;
      var reqW=totalM*wpm*1.2;
      var PSU=[25,50,75,100,150,200,250,350];
      var psuText='', splitNote='';
      if(reqW>350||totalM>5){
        var num=Math.ceil(Math.max(reqW/350,totalM/5));
        var wpu=reqW/num;
        var mpsu=PSU.find(function(w){return w>=wpu;})||350;
        psuText=num+" יח' זהות של "+mpsu+'W';
        splitNote='⚠️ תכנון בטוח: פיצול ל-'+num+' הזנות למניעת מפל מתח.';
      } else {
        var matchedPsu=PSU.find(function(w){return w>=reqW;})||350;
        psuText="יח' אחת של "+matchedPsu+'W';
      }
      var html='<div class="cfg-bom-item"><span>אורך חיתוך אלומיניום</span><span class="cfg-bom-val">'+totalM.toFixed(2)+' מ\'</span></div>';
      html+='<div class="cfg-bom-item"><span>סוג התקנה / ייעוד</span><span class="cfg-bom-val">'+state.installType+' / '+state.lightingType+'</span></div>';
      html+='<div class="cfg-bom-item"><span>גוון וגימור</span><span class="cfg-bom-val">'+state.cct+' / '+state.color+'</span></div>';
      html+='<div class="cfg-bom-item"><span>הזנת חשמל ⚡</span><span class="cfg-bom-val">צלע מס\' '+(state.feedIndex+1)+'</span></div>';
      if(corners>0) html+='<div class="cfg-bom-item"><span>פינות 90° + הלחמות</span><span class="cfg-bom-val">'+corners+'</span></div>';
      html+='<div class="cfg-bom-item" style="border-bottom:none;flex-direction:column;gap:4px"><div style="display:flex;justify-content:space-between;width:100%"><span>ספקי כוח (24V)</span><span class="cfg-bom-val">'+psuText+'</span></div>'+(splitNote?'<div style="font-size:10px;color:#E8A020">'+splitNote+'</div>':'')+'</div>';
      rootEl.querySelector('#cfg-bom').innerHTML=html;
      var msg='*הזמנת מפרט LEDLink (מצורף שרטוט)*\n---\nאורך: '+totalM.toFixed(2)+' מ\'\nייעוד: '+state.lightingType+'\nהתקנה: '+state.installType+'\nגוון/גימור: '+state.cct+'/'+state.color+'\nספקים: '+psuText+'\n📌 הזנה: צלע '+(state.feedIndex+1)+'\n\n*נא לצרף את תמונת השרטוט ששמרתם.*';
      var isMobile=/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
      waUrl=isMobile
        ?'https://wa.me/972524444470?text='+encodeURIComponent(msg)
        :'https://web.whatsapp.com/send?phone=972524444470&text='+encodeURIComponent(msg);
      goToStep(4);
    }

    function clearCanvas() {
      state.locked=false; state.vertices=[]; state.inputs=[]; state.feedIndex=0; state.feedSelected=false;
      toolClear.style.display='none'; toolRotate.style.display='none';
      redrawCanvas(); statusEl.innerText='צייר כעת...';
    }

    // 5. Wire up buttons
    rootEl.querySelector('#cfg-tpl-I').onclick    = function(){ selectTemplate('I'); };
    rootEl.querySelector('#cfg-tpl-L').onclick    = function(){ selectTemplate('L'); };
    rootEl.querySelector('#cfg-tpl-U').onclick    = function(){ selectTemplate('U'); };
    rootEl.querySelector('#cfg-tpl-FREE').onclick = function(){ selectTemplate('FREE'); };
    rootEl.querySelector('#cfg-back-1').onclick   = function(){ goToStep(1); };
    rootEl.querySelector('#cfg-next-2').onclick   = validateAndProceed;
    rootEl.querySelector('#cfg-back-2').onclick   = function(){ goToStep(2); };
    rootEl.querySelector('#cfg-next-3').onclick   = generateFinalBOM;
    rootEl.querySelector('#cfg-back-3').onclick   = function(){ goToStep(3); };
    rootEl.querySelector('#cfg-restart').onclick  = function(){ clearCanvas(); goToStep(1); };
    rootEl.querySelector('#cfg-tool-rotate').onclick = rotateShape;
    rootEl.querySelector('#cfg-tool-clear').onclick  = clearCanvas;
    rootEl.querySelector('#cfg-dl-btn').onclick      = downloadSnapshot;

    // WA send — overlay at body level (avoids backdrop-filter clipping)
    var waUrl     = '';
    var waLink    = rootEl.querySelector('#cfg-wa-link');
    var waOverlay = document.createElement('div');
    waOverlay.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:99999;align-items:center;justify-content:center;';
    waOverlay.innerHTML = '<div style="background:#0f1724;border:1px solid #E8A020;border-radius:14px;padding:28px 24px 24px;max-width:340px;width:90%;position:relative;text-align:right;font-family:Heebo,sans-serif">'
      + '<button id="cfg-wa-close-btn" style="position:absolute;top:12px;left:14px;background:transparent;border:none;color:#aaa;font-size:22px;cursor:pointer;line-height:1">✕</button>'
      + '<div style="font-size:32px;margin-bottom:12px">📎</div>'
      + '<div style="font-size:16px;font-weight:700;color:#E8A020;margin-bottom:10px">רגע לפני השליחה</div>'
      + '<div style="font-size:14px;color:#E0DDD6;line-height:1.7">השרטוט שלך יורד אוטומטית.<br>צרף אותו להודעת הוואטסאפ כדי שנוכל לעבד את ההזמנה מהר יותר.</div>'
      + '</div>';
    document.body.appendChild(waOverlay);

    function dismissWaOverlay() {
      waOverlay.style.display = 'none';
      downloadSnapshot();
      setTimeout(function(){ window.open(waUrl, '_blank'); }, 400);
    }
    waLink.onclick = function() { waOverlay.style.display = 'flex'; };
    waOverlay.querySelector('#cfg-wa-close-btn').onclick = dismissWaOverlay;
    waOverlay.addEventListener('click', function(e) {
      if (e.target === waOverlay) dismissWaOverlay();
    });

    // Design option buttons
    var designGroups = [
      { ids:['cfg-c-BLK','cfg-c-WHT'],               key:'color',        vals:['BLK','WHT'] },
      { ids:['cfg-k-3000','cfg-k-4000'],              key:'cct',          vals:['3000K','4000K'] },
      { ids:['cfg-lighting-central','cfg-lighting-mood'], key:'lightingType', vals:['מרכזית','אווירה'] },
      { ids:['cfg-install-recessed','cfg-install-surface'], key:'installType', vals:['שקוע','צמוד/תלוי'] },
    ];
    designGroups.forEach(function(grp){
      grp.ids.forEach(function(id, idx){
        var el=rootEl.querySelector('#'+id);
        if(!el) return;
        el.onclick=function(){
          grp.ids.forEach(function(gid){ rootEl.querySelector('#'+gid).classList.remove('selected'); });
          el.classList.add('selected');
          state[grp.key]=grp.vals[idx];
        };
      });
    });

    // Return cleanup
    return function() {
      canvas.removeEventListener('pointerdown', onPointerDown);
      canvas.removeEventListener('pointermove', onPointerMove);
      canvas.removeEventListener('pointerup',   onPointerUp);
      window.removeEventListener('popstate', onPopState);
      if (waOverlay && waOverlay.parentNode) waOverlay.parentNode.removeChild(waOverlay);
    };
  };
