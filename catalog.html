<!DOCTYPE html>
<html lang="he" dir="rtl" style="background:#F4F4F0">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEDLink Components — קטלוג מקצועי</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface:      '#F4F4F0',
            'surface-alt':'#ECEAE4',
            card:         '#FFFFFF',
            'card-hover': '#FAFAF8',
            border:       '#E0DDD6',
            'border-dark':'#C8C4BC',
            nav:          '#1A1A1A',
            gold:         '#E8A020',
            'gold-dim':   '#C4880A',
            'gold-faint': 'rgba(232,160,32,0.12)',
            ink:          '#1C1C1C',
            'ink-soft':   '#555555',
            'ink-faint':  '#999999',
          },
          fontFamily: {
            sans: ['Heebo', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; scrollbar-gutter: stable; }
    @view-transition { navigation: auto; }
    ::view-transition-old(root), ::view-transition-new(root) { animation-duration: 0.08s; }
    body { background: #F4F4F0; color: #1C1C1C; font-family: 'Heebo', sans-serif; overflow-x: hidden; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #F4F4F0; }
    ::-webkit-scrollbar-thumb { background: #C8C4BC; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #E8A020; }

    .gold-underline {
      border-bottom: 2px solid #E8A020;
      padding-bottom: 2px;
    }

    .tab-active {
      color: #E8A020;
      border-bottom: 2px solid #E8A020;
    }

    .product-card {
      background: #FFFFFF;
      border: 1px solid #E0DDD6;
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .product-card:hover {
      border-color: #E8A020;
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .filter-chip {
      border: 1px solid #D0CCC4;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      color: #666666;
      background: #FFFFFF;
      white-space: nowrap;
    }
    .filter-chip:hover { border-color: #E8A020; color: #E8A020; }
    .filter-chip.active { border-color: #E8A020; color: #FFFFFF; background: #E8A020; }

    .spec-tag {
      background: #F0EDE8;
      border: 1px solid #E0DDD6;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      color: #666666;
      display: inline-block;
    }
    .spec-tag.highlight { border-color: rgba(232,160,32,0.5); color: #C4880A; background: rgba(232,160,32,0.08); }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      backdrop-filter: blur(4px);
    }
    .modal-box {
      background: #FFFFFF;
      border: 1px solid #E0DDD6;
      border-radius: 14px;
      width: 100%; max-width: 680px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,0.15);
    }

    .btn-gold {
      background: #E8A020;
      color: #FFFFFF;
      font-weight: 700;
      border-radius: 6px;
      padding: 10px 20px;
      transition: background 0.15s;
      border: none;
      cursor: pointer;
      display: inline-block;
      text-align: center;
    }
    .btn-gold:hover { background: #C4880A; }

    .btn-outline {
      border: 1px solid #D0CCC4;
      color: #555555;
      font-weight: 600;
      border-radius: 6px;
      padding: 9px 18px;
      transition: all 0.15s;
      background: transparent;
      cursor: pointer;
      display: inline-block;
      text-align: center;
    }
    .btn-outline:hover { border-color: #E8A020; color: #E8A020; }

    .search-input {
      background: #FFFFFF;
      border: 1px solid #D0CCC4;
      border-radius: 6px;
      color: #1C1C1C;
      padding: 10px 40px 10px 16px;
      font-family: 'Heebo', sans-serif;
      font-size: 14px;
      width: 100%;
      transition: border-color 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .search-input:focus { outline: none; border-color: #E8A020; }
    .search-input::placeholder { color: #AAAAAA; }

    .no-img-placeholder {
      width: 100%; padding-top: 65%;
      background: linear-gradient(135deg, #F0EDE8 0%, #ECEAE4 100%);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    .nav-drop-item {
      display: block; padding: 10px 20px;
      color: #AAAAAA; text-decoration: none;
      font-size: 14px; font-weight: 500;
      border-right: 2px solid transparent;
      transition: all 0.15s; background: transparent;
      width: 100%; text-align: right; cursor: pointer;
      font-family: 'Heebo', sans-serif; box-sizing: border-box;
      border-top: none; border-bottom: none; border-left: none;
    }
    .nav-drop-item:hover { color: #E8A020; background: rgba(255,255,255,0.04); border-right-color: #E8A020; }

    .catalog-layout { display: grid; gap: 40px; align-items: start; }
    .catalog-layout.with-sidebar { grid-template-columns: 240px 1fr; }
    .catalog-layout.no-sidebar   { grid-template-columns: 1fr; }

    /* ── Hamburger / Mobile Drawer ── */
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 8px; flex-direction: column; justify-content: center; gap: 5px; }
    .hamburger-line { display: block; width: 22px; height: 2px; background: #fff; border-radius: 1px; transition: transform 0.25s, opacity 0.25s; }
    .hamburger.open .hamburger-line:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.open .hamburger-line:nth-child(2) { opacity: 0; }
    .hamburger.open .hamburger-line:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
    .mm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 149; }
    .mm-overlay.open { display: block; }
    .mobile-menu { position: fixed; top: 0; right: 0; bottom: 0; width: 280px; background: #1A1A1A; border-left: 1px solid #2A2A2A; z-index: 150; overflow-y: auto; transform: translateX(110%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); box-shadow: -12px 0 40px rgba(0,0,0,0.6); }
    .mobile-menu.open { transform: translateX(0); }
    .mm-header { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 64px; border-bottom: 1px solid #222; }
    .mm-close { background: none; border: none; cursor: pointer; color: #666; font-size: 22px; line-height: 1; padding: 4px; transition: color 0.15s; }
    .mm-close:hover { color: #fff; }
    .mm-link { display: block; padding: 13px 24px; color: #AAAAAA; text-decoration: none; font-size: 15px; font-weight: 500; border-right: 3px solid transparent; transition: all 0.15s; cursor: pointer; }
    .mm-link:hover { color: #E8A020; border-right-color: #E8A020; background: rgba(255,255,255,0.04); }
    .mm-link.sub { padding-right: 40px; font-size: 13px; color: #777; }
    .mm-link.active { color: #E8A020; background: rgba(232,160,32,0.07); }
    .mm-label { font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #444; padding: 16px 24px 4px; }
    .mm-divider { height: 1px; background: #252525; margin: 8px 0; }

    @media (max-width: 768px) {
      .sidebar-mobile-hidden { display: none; }
      .catalog-layout.with-sidebar { grid-template-columns: 1fr; }
    }
    @media (max-width: 900px) {
      .nav-desktop-links { display: none !important; }
      .hamburger { display: flex; }
    }
    .products-grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    @media (max-width: 600px) {
      .catalog-content-pad { padding: 24px 16px !important; }
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .tab-button { padding: 12px 14px !important; gap: 4px !important; font-size: 13px !important; }
    }

    .pulse-gold {
      animation: pulseGold 2s infinite;
    }
    @keyframes pulseGold {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .footer { background: #111; padding: 48px 32px 0; border-top: 1px solid #222; }
    .footer-inner { max-width: 1200px; margin: 0 auto; }
    .footer-top { display: grid; grid-template-columns: 1.6fr 1fr 1fr 1fr; gap: 48px; padding-bottom: 40px; border-bottom: 1px solid #1E1E1E; }
    .footer-logo-led { font-size: 24px; font-weight: 900; color: #E8A020; }
    .footer-logo-link { font-size: 24px; font-weight: 300; color: #fff; }
    .footer-tagline { font-size: 13px; color: #555; margin-top: 10px; line-height: 1.6; max-width: 220px; }
    .footer-col-title { font-size: 11px; font-weight: 700; color: #555; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 18px; }
    .footer-links { display: flex; flex-direction: column; gap: 12px; }
    .footer-link { color: #888; text-decoration: none; font-size: 14px; transition: color 0.15s; display: flex; align-items: center; gap: 9px; }
    .footer-link:hover { color: #E8A020; }
    .footer-link svg { flex-shrink: 0; opacity: 0.5; transition: opacity 0.15s; }
    .footer-link:hover svg { opacity: 1; }
    .footer-hours-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #888; gap: 12px; }
    .footer-hours-row + .footer-hours-row { margin-top: 12px; }
    .hours-open { color: #4CAF50; font-size: 12px; font-weight: 600; }
    .hours-closed { color: #555; font-size: 12px; font-weight: 600; }
    .footer-bottom { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; padding: 20px 0; }
    .footer-copy { font-size: 12px; color: #3A3A3A; }
    .footer-legal { display: flex; flex-wrap: wrap; gap: 6px 20px; }
    .footer-legal a { font-size: 12px; color: #3A3A3A; text-decoration: none; transition: color 0.15s; }
    .footer-legal a:hover { color: #E8A020; }
    @media (max-width: 768px) { .footer-top { grid-template-columns: 1fr 1fr; gap: 32px; } }
    @media (max-width: 480px) { .footer-top { grid-template-columns: 1fr; } }
  </style>

  <!-- React + Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

</head>
<body>
  <div id="root"></div>

  <!-- Products data (373 products: profiles, LED strips, drivers) -->
  <script src="products_data.js"></script>
  <!-- Datasheets data -->
  <script src="datasheets_data.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ── Base path for images/datasheets (local dev) ──
    const IMG_BASE = '';

    // ── Helpers ──
    function cleanName(s) {
      return (s||'').replace(/&#(\d+);/g,(_,n)=>String.fromCharCode(+n)).replace(/&amp;/g,'&').replace(/&#038;/g,'&');
    }

    function imgSrc(path) {
      if (!path) return null;
      if (path.startsWith('http')) return path;
      return IMG_BASE + path;
    }

    function pdfSrc(path) {
      if (!path) return null;
      return path;
    }

    // ── Strip metadata ──
    function parseStripDesc(desc) {
      if (!desc) return {};
      const ipM = desc.match(/IP(\d+)/i);
      const wM  = desc.match(/(\d+(?:\.\d+)?)\s*W/i);
      const isRGBW = /RGBW/i.test(desc), isRGB = !isRGBW && /RGB/i.test(desc);
      return {
        ip:    ipM ? 'IP'+ipM[1] : '',
        power: wM  ? parseFloat(wM[1]) : null,
        color: isRGBW ? 'RGBW' : isRGB ? 'RGB' : 'לבן',
        type:  /COB/i.test(desc)?'COB':/נאון/.test(desc)?'נאון':/זיגזג/.test(desc)?'זיגזג':/דיגיטלי/.test(desc)?'דיגיטלי':'סטנדרט',
      };
    }
    function getStripMeta(p) {
      const d = parseStripDesc(p.desc || '');
      const name = (p.name || '').toUpperCase();
      const sub  = p.subCategory || '';
      const ip = p.specs?.ip || d.ip || '';
      const power = (d.power !== undefined && d.power !== null) ? d.power
        : p.specs?.power ? parseFloat(p.specs.power) : null;
      let color = d.color;
      if (!p.desc) {
        if (/RGBW/i.test(name)) color = 'RGBW';
        else if (/RGB/i.test(name) || sub === 'RGB') color = 'RGB';
        else color = 'לבן';
      }
      let type = d.type;
      if (!p.desc) {
        if (sub === 'COB' || /COB|DOB/i.test(name)) type = 'COB';
        else if (sub === 'Neon' || /NEON/i.test(name) || /נאון/.test(name)) type = 'נאון';
        else if (sub === 'SPI' || /\bSPI\b/i.test(name)) type = 'דיגיטלי';
        else if (/3D/i.test(name)) type = 'זיגזג';
        else type = 'סטנדרט';
      }
      const voltage = p.specs?.voltage || p.specs?.inputVoltage ||
        ((p.desc||'').match(/\b(12|24|48)V\b/)?.[0] ?? '');
      return { ip, power, type, color, voltage };
    }

    // ── Filter constants ──
    const STRIP_IP_OPTIONS      = ['הכל','IP20','IP65','IP67','IP68'];
    const STRIP_TYPE_OPTIONS    = ['הכל','סטנדרט','COB','נאון','זיגזג','דיגיטלי'];
    const STRIP_COLOR_OPTIONS   = ['הכל','לבן','RGB','RGBW'];
    const STRIP_VOLTAGE_OPTIONS = ['הכל','12V','24V','48V'];
    const STRIP_POWER_RANGES    = [
      {label:'הכל',min:0,max:99999},{label:'עד 10W',min:0,max:10},
      {label:'10–15W',min:10,max:15},{label:'15–20W',min:15,max:20},{label:'20W+',min:20,max:99999},
    ];
    const STRIP_LMW_RANGES = [
      {label:'הכל',min:0,max:99999},{label:'עד 100',min:0,max:100},
      {label:'100–150',min:100,max:150},{label:'150–200',min:150,max:200},{label:'200+',min:200,max:99999},
    ];
    const PS_VOLTAGE_OPTIONS = ['הכל','12V','24V','48V'];
    const PS_IP_OPTIONS      = ['הכל','IP20','IP65','IP67','IP68'];
    const PS_OUTPUT_OPTIONS  = ['הכל','CV','CC','CV+CC'];
    const PS_DIMMING_OPTIONS = ['הכל','DALI','0-10V','PWM','TRIAC','Resistor','Push'];
    const PS_POWER_RANGES    = [
      {label:'הכל',min:0,max:99999},{label:'עד 30W',min:0,max:30},
      {label:'30–60W',min:30,max:60},{label:'60–100W',min:60,max:100},
      {label:'100–200W',min:100,max:200},{label:'200W+',min:200,max:99999},
    ];
    const INIT_STRIP = { ip:'הכל', type:'הכל', color:'הכל', voltage:'הכל', power:'הכל', lmw:'הכל' };
    const INIT_PS    = { voltage:'הכל', ip:'הכל', output:'הכל', dimming:'הכל', power:'הכל' };

    // ── SVG Icons ──
    const Icons = {
      search:   <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      close:    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      phone:    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.64 3.3 2 2 0 0 1 3.62 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
      filter:   <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
      wa:       <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>,
      download: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
      external: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
      chevron:  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>,
    };

    // ── Filter Chip ──
    const Chip = ({ label, active, onClick }) => (
      <button className={`filter-chip ${active ? 'active' : ''}`} onClick={onClick}>{label}</button>
    );

    // ── Product Image ──
    const ProductImg = ({ src, name, tall }) => {
      const [err, setErr] = useState(false);
      const h = tall ? 'padding-top: 75%' : '';
      if (!src || err) return (
        <div style={{paddingTop: tall ? '75%' : '65%', position:'relative', background:'#F0EDE8'}}>
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <span style={{fontSize:11,color:'#CCCCCC',letterSpacing:2}}>LEDLINK</span>
          </div>
        </div>
      );
      return (
        <div style={{paddingTop: tall ? '75%' : '65%', position:'relative', overflow:'hidden'}}>
          <img
            src={imgSrc(src)}
            alt={name}
            onError={() => setErr(true)}
            style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'contain',padding:'12px'}}
          />
        </div>
      );
    };

    // ── Spec Tags for product card ──
    const SpecTags = ({ product }) => {
      const cat = product.category;
      const tags = [];
      if (cat === 'דרייברים') {
        if (product.specs?.power) tags.push({ label: product.specs.power, hi: true });
        if (product.specs?.voltage) tags.push({ label: product.specs.voltage });
        if (product.specs?.ip) tags.push({ label: product.specs.ip });
        if (product.specs?.outputMode) tags.push({ label: product.specs.outputMode });
        if (product.specs?.dimming?.length) tags.push({ label: product.specs.dimming[0] });
      } else if (cat === 'סטריפ LED') {
        const m = getStripMeta(product);
        if (m.power) tags.push({ label: m.power+'W/m', hi: true });
        if (m.voltage) tags.push({ label: m.voltage });
        if (m.ip) tags.push({ label: m.ip });
        if (m.type && m.type !== 'סטנדרט') tags.push({ label: m.type });
        if (m.color !== 'לבן') tags.push({ label: m.color });
      } else if (cat === 'פרופילים') {
        const d = product.desc || '';
        const mkat = d.match(/מקט:\s*([^\s|]+)/);
        const mlen = d.match(/(?:אורך[^:]*:\s*)([^\s|]+)/);
        const mip  = d.match(/IP(\d+)/i);
        if (mkat) tags.push({ label: mkat[1], hi: true });

    // ── Main App ──
    const TABS = [
      { id: 'דרייברים',  label: 'דרייברים', desc: 'ספקי מתח LED מאירופה — קבוע מתח, קבוע זרם, עמעום' },
      { id: 'סטריפ LED', label: 'סטריפ LED', desc: 'סטריפ LED באיכות גבוהה לכל שימוש — COB, Neon, RGB ועוד' },
      { id: 'פרופילים',  label: 'פרופילים', desc: 'פרופילי אלומיניום לסטריפ LED — ייצור בהזמנה אישית' },
    ];

    const App = () => {
      const [products, setProducts]       = useState([]);
      const [activeTab, setActiveTab]     = useState('דרייברים');
      const [selected, setSelected]       = useState(null);
      const [search, setSearch]           = useState('');
      const [stripF, setStripF]           = useState({...INIT_STRIP});
      const [psF, setPsF]                 = useState({...INIT_PS});
      const [sidebarOpen, setSidebarOpen] = useState(false);

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        if (window.__PRODUCTS__) {
          const loaded = window.__PRODUCTS__.map(p => ({...p, name: cleanName(p.name)}));
          setProducts(loaded);
          const productId = params.get('product');
          if (productId) {
            const found = loaded.find(p => p.id === decodeURIComponent(productId));
            if (found) {
              setSelected(found);
              setActiveTab(found.category);
            }
          }
        }
        const tab = params.get('tab');
        if (tab) setActiveTab(tab);
      }, []);

      // Switch tab: reset search + filters
      const switchTab = useCallback(id => {
        setActiveTab(id);
        setSearch('');
        setStripF({...INIT_STRIP});
        setPsF({...INIT_PS});
        setSidebarOpen(false);
      }, []);

      const filtered = useMemo(() => {
        let r = products.filter(p => p.category === activeTab);
        if (search.trim()) {
          const q = search.trim().toLowerCase();
          r = r.filter(p => p.name.toLowerCase().includes(q) || (p.desc||'').toLowerCase().includes(q));
        }
        if (activeTab === 'סטריפ LED') {
          r = r.filter(p => {
            const m = getStripMeta(p);
            if (stripF.ip !== 'הכל' && m.ip !== stripF.ip) return false;
            if (stripF.type !== 'הכל' && m.type !== stripF.type) return false;
            if (stripF.color !== 'הכל' && m.color !== stripF.color) return false;
            if (stripF.voltage !== 'הכל' && m.voltage !== stripF.voltage) return false;
            if (stripF.power !== 'הכל') {
              const range = STRIP_POWER_RANGES.find(x => x.label === stripF.power);
              if (range && (m.power === null || m.power < range.min || m.power > range.max)) return false;
            }
            if (stripF.lmw !== 'הכל') {
              const desc = p.desc || '';
              const lmwM = desc.match(/(\d+(?:\.\d+)?)\s*Lm\/W/i);
              const val = lmwM ? parseFloat(lmwM[1]) : null;
              const range = STRIP_LMW_RANGES.find(x => x.label === stripF.lmw);
              if (range && (val === null || val < range.min || val > range.max)) return false;
            }
            return true;
          });
        }
        if (activeTab === 'דרייברים') {
          r = r.filter(p => {
            const s = p.specs || {};
            if (psF.voltage !== 'הכל' && s.voltage !== psF.voltage) return false;
            if (psF.ip !== 'הכל' && s.ip !== psF.ip) return false;
            if (psF.output !== 'הכל' && s.outputMode !== psF.output) return false;
            if (psF.dimming !== 'הכל' && !(s.dimming||[]).some(d => d.toLowerCase().includes(psF.dimming.toLowerCase()))) return false;
            if (psF.power !== 'הכל') {
              const range = PS_POWER_RANGES.find(x => x.label === psF.power);
              const pw = s.power ? parseFloat(s.power) : null;
              if (range && (pw === null || pw < range.min || pw > range.max)) return false;
            }
            return true;
          });
        }
        return r;
      }, [products, activeTab, search, stripF, psF]);

      const tabInfo = TABS.find(t => t.id === activeTab);
      const showFilters = activeTab !== 'פרופילים';

      const renderSidebar = () => {
        if (activeTab === 'פרופילים') return <ProfileFilters count={filtered.length} />;
        if (activeTab === 'סטריפ LED') return <StripFilters filters={stripF} setFilters={setStripF} count={filtered.length} />;
        if (activeTab === 'דרייברים') return <DriverFilters filters={psF} setFilters={setPsF} count={filtered.length} />;
      };

      return (
        <div style={{minHeight:'100vh',background:'#F4F4F0'}}>
          <Navbar activeTab={activeTab} setActiveTab={switchTab} />

          {/* Tab bar */}
          <div style={{borderBottom:'1px solid #E0DDD6',background:'#FFFFFF',position:'sticky',top:64,zIndex:90,boxShadow:'0 1px 4px rgba(0,0,0,0.04)'}}>
            <div style={{maxWidth:1280,margin:'0 auto',padding:'0 24px',display:'flex',gap:0}}>
              {TABS.map(t => {
                const cnt = products.filter(p => p.category === t.id).length;
                const active = activeTab === t.id;
                return (
                  <button key={t.id} onClick={()=>switchTab(t.id)}
                    className="tab-button"
                    style={{
                      padding:'16px 24px',
                      border:'none',
                      borderBottom: active ? '2px solid #E8A020' : '2px solid transparent',
                      background:'none',cursor:'pointer',
                      color: active ? '#E8A020' : '#777777',
                      fontFamily:'Heebo,sans-serif',
                      fontSize:14,fontWeight:700,
                      transition:'all 0.15s',
                      display:'flex',alignItems:'center',gap:8,
                    }}>
                    {t.label}
                    <span style={{fontSize:11,background: active?'rgba(232,160,32,0.12)':'#F0EDE8',
                      color: active?'#E8A020':'#999999',
                      padding:'1px 7px',borderRadius:20,fontWeight:700}}>
                      {cnt}
                    </span>
                  </button>
                );
              })}
            </div>
          </div>

          {/* Content */}
          <div className="catalog-content-pad" style={{maxWidth:1280,margin:'0 auto',padding:'40px 24px'}}>

            {/* Category header */}
            <CategoryHeader label={tabInfo.label} count={filtered.length} desc={tabInfo.desc} />

            {/* Search + mobile filter toggle */}
            <div style={{display:'flex',gap:12,marginBottom:32,alignItems:'center'}}>
              <div style={{position:'relative',flex:1,maxWidth:400}}>
                <input
                  type="text"
                  placeholder={`חיפוש ב${tabInfo.label}...`}
                  value={search}
                  onChange={e=>setSearch(e.target.value)}
                  className="search-input"
                />
                <span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',color:'#BBBBBB',pointerEvents:'none'}}>
                  {Icons.search}
                </span>
              </div>
              {showFilters && (
                <button onClick={()=>setSidebarOpen(o=>!o)}
                  className="btn-outline"
                  style={{display:'flex',alignItems:'center',gap:8,fontSize:13,display:'none'}}
                  id="mobile-filter-btn">
                  {Icons.filter} סינון
                </button>
              )}
            </div>

            {/* Main layout */}
            <div className={showFilters ? 'catalog-layout with-sidebar' : 'catalog-layout no-sidebar'}>

              {/* Sidebar */}
              {showFilters && (
                <div className="sidebar-mobile-hidden" style={{background:'#FFFFFF',border:'1px solid #E0DDD6',borderRadius:10,padding:'24px 20px',position:'sticky',top:130,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:24,paddingBottom:16,borderBottom:'1px solid #E8E5E0'}}>
                    <span style={{color:'#E8A020'}}>{Icons.filter}</span>
                    <span style={{fontSize:13,fontWeight:700,color:'#1C1C1C'}}>סינון</span>
                  </div>
                  {renderSidebar()}
                </div>
              )}

              {/* Product grid */}
              <div>
                {activeTab === 'פרופילים' && (
                  <div style={{marginBottom:24,background:'#FFFFFF',border:'1px solid #E0DDD6',borderRadius:10,padding:'20px 24px',boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
                    <ProfileFilters count={filtered.length} />
                  </div>
                )}
                {filtered.length === 0 ? (
                  <div style={{textAlign:'center',padding:'80px 0',color:'#BBBBBB'}}>
                    <div style={{fontSize:48,marginBottom:16}}>◯</div>
                    <div style={{fontSize:16,color:'#888888'}}>לא נמצאו מוצרים</div>
                    <button onClick={()=>{setSearch('');setStripF({...INIT_STRIP});setPsF({...INIT_PS})}}
                      style={{marginTop:16,color:'#E8A020',background:'none',border:'none',cursor:'pointer',fontSize:14}}>
                      נקה סינון
                    </button>
                  </div>
                ) : (
                  <div className="products-grid">
                    {filtered.map(p => (
                      <ProductCard key={p.id} product={p} onClick={setSelected} />
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>

          <Footer />

          {/* Modal */}
          {selected && <ProductModal product={selected} onClose={()=>{ setSelected(null); history.replaceState(null,'',location.pathname + (activeTab ? '?tab='+encodeURIComponent(activeTab) : '')); }} />}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script src="a11y-widget.js"></script>
  <button id="scroll-top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="חזרה לראש העמוד">&#8679;</button>
  <style>
    #scroll-top-btn{position:fixed;bottom:24px;right:20px;width:44px;height:44px;border-radius:50%;background:#1d4ed8;color:#fff;border:none;font-size:24px;line-height:1;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,0.25);opacity:0;transform:translateY(16px);transition:opacity .25s,transform .25s;z-index:998;pointer-events:none;display:flex;align-items:center;justify-content:center;}
    #scroll-top-btn.visible{opacity:1;transform:translateY(0);pointer-events:auto;}
    #scroll-top-btn:hover{background:#1e40af;}
  </style>
  <script>
    (function(){ var b=document.getElementById('scroll-top-btn');
      window.addEventListener('scroll',function(){ b.classList.toggle('visible',window.scrollY>300); },{passive:true});
    })();
  </script></body>
