<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const WA_NUMBER = '972524444470';
    const waLink = (text) => `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(text)}`;

    const WaIcon = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
      </svg>
    );

    /* ── Shared Contact Row (WA + Phone) ── */
    const PHONE_HREF = 'tel:+97286326059';
    const ContactRow = ({ waHref, disabled }) => (
      <div className="flex gap-2">
        <a href={PHONE_HREF}
          className="flex items-center justify-center font-bold py-3 px-5 rounded text-sm flex-shrink-0 transition-colors"
          style={{background:'#1C1C1C', color:'#fff', textDecoration:'none'}}>
          📞
        </a>
        <a href={disabled ? undefined : waHref} target="_blank" rel="noopener noreferrer"
          className="flex items-center justify-center gap-2 flex-1 font-bold py-3 rounded transition-colors text-sm"
          style={{background: disabled ? '#d1d5db' : '#25D366', color:'#fff', textDecoration:'none', pointerEvents: disabled ? 'none' : 'auto'}}>
          <WaIcon/> דבר איתנו
        </a>
      </div>
    );

    /* ── Voltage Drop Calculator ── */
    const VoltageDropCalc = () => {
      const [distance, setDistance] = useState('');
      const [totalW,   setTotalW]   = useState('');
      const [volt,     setVolt]     = useState('24');
      const [gauge,    setGauge]    = useState('1.5');
      const GAUGES = [
        { v: '0.5',  label: '0.5 ממ"ר', r: 36.0  },
        { v: '0.75', label: '0.75 ממ"ר', r: 24.5 },
        { v: '1',    label: '1.0 ממ"ר', r: 18.1  },
        { v: '1.5',  label: '1.5 ממ"ר', r: 12.1  },
        { v: '2.5',  label: '2.5 ממ"ר', r: 7.41  },
      ];

      const calc = () => {
        if (distance === '' && totalW === '') return null; // שדות ריקים — אין תוצאה עדיין
        const D = parseFloat(distance), W = parseFloat(totalW), V = parseFloat(volt);
        if (isNaN(D) || isNaN(W)) return null;
        if (D <= 0) return { error: 'מרחק חייב להיות גדול מ-0' };
        if (W <= 0) return { error: 'עומס חייב להיות גדול מ-0 ואט' };
        const g = GAUGES.find(g => g.v === gauge);
        const I = W / V;
        const Vdrop = (2 * D * I * g.r) / 1000;
        const Varrival = V - Vdrop;
        const pct = (Vdrop / V) * 100;
        let status, color, rec;
        if (pct <= 3)      { status = 'תקין';   color = 'green'; rec = 'הכבל מתאים לעומס הנדרש.'; }
        else if (pct <= 5) { status = 'גבולי';  color = 'amber'; rec = `שקול מעבר ל-${volt === '12' ? '24V' : '48V'} או הגדלת ממ"ר.`; }
        else               { status = 'בעייתי'; color = 'red';   rec = `נדרש שינוי: ${volt === '12' ? 'עבור ל-24V' : volt === '24' ? 'עבור ל-48V או הזן כבל עבה יותר' : 'הוסף נקודת הזנה נוספת'}.`; }
        return { pct: pct.toFixed(1), Vdrop: Vdrop.toFixed(2), Varrival: Varrival.toFixed(2), status, color, rec, I: I.toFixed(2) };
      };

      const result = calc();

      const waText = result
        ? `🔆 בדיקת מפל מתח — LEDLink\n──────────────────────\n📏 מרחק מהספק למקור: ${distance} מ׳\n⚡ מתח: ${volt}V | עומס: ${totalW}W\n🔌 כבל: ${gauge} ממ"ר\n\nתוצאה: מפל ${result.pct}% (${result.Vdrop}V) — מתח שמגיע למקור האור: ${result.Varrival}V — ${result.status}\n${result.rec}\n\nאשמח לקבל הצעת מחיר למקור אור ומתח מתאים`
        : '';

      const colors = { green: 'bg-green-50 border-green-200 text-green-800', amber: 'bg-amber-50 border-amber-200 text-amber-800', red: 'bg-red-50 border-red-200 text-red-800' };
      const icons  = { green: '✅', amber: '⚠️', red: '❌' };

      return (
        <div className="bg-white rounded-lg border border-border p-6 mb-6">
          <div className="flex items-center gap-3 mb-5">
            <div className="w-10 h-10 bg-amber-100 rounded-lg flex items-center justify-center text-xl">⚡</div>
            <div>
              <h3 className="font-black text-lg text-ink">מחשבון מפל מתח</h3>
              <p className="text-xs text-muted">בדוק כמה מתח יגיע למקור האור (סטריפ, ספוט, או כל גוף DC)</p>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-4 mb-4">
            <div>
              <label className="block text-xs font-bold text-ink mb-1">מרחק מהספק למקור האור (מ׳)</label>
              <input type="number" value={distance} onChange={e=>setDistance(e.target.value)} placeholder="לדוגמה: 8"
                className="w-full border border-border rounded px-3 py-2 text-sm"/>
            </div>
            <div>
              <label className="block text-xs font-bold text-ink mb-1">סה"כ עומס (ואט)</label>
              <input type="number" value={totalW} onChange={e=>setTotalW(e.target.value)} placeholder="לדוגמה: 72"
                className="w-full border border-border rounded px-3 py-2 text-sm"/>
            </div>
            <div>
              <label className="block text-xs font-bold text-ink mb-1">מתח</label>
              <select value={volt} onChange={e=>setVolt(e.target.value)} className="w-full border border-border rounded px-3 py-2 text-sm bg-white">
                {['12','24','48'].map(v => <option key={v} value={v}>{v}V</option>)}
              </select>
            </div>
            <div>
              <label className="block text-xs font-bold text-ink mb-1">עובי כבל</label>
              <select value={gauge} onChange={e=>setGauge(e.target.value)} className="w-full border border-border rounded px-3 py-2 text-sm bg-white">
                {GAUGES.map(g => <option key={g.v} value={g.v}>{g.label}</option>)}
              </select>
            </div>
          </div>
          {result && result.error && (
            <div className="rounded-lg border border-red-200 bg-red-50 p-3 mb-4 flex items-center gap-2">
              <span>⚠️</span>
              <p className="text-sm font-bold text-red-700">{result.error}</p>
            </div>
          )}
          {result && !result.error && (
            <div className={`rounded-lg border p-4 mb-4 ${colors[result.color]}`}>
              <div className="flex items-center gap-2 mb-2">
                <span className="text-lg">{icons[result.color]}</span>
                <span className="font-black text-lg">{result.status} — מפל {result.pct}% ({result.Vdrop}V)</span>
              </div>
              <p className="text-sm mb-1">זרם: {result.I}A | מתח שמגיע למקור האור: <strong>{result.Varrival}V</strong> מתוך {volt}V</p>
              <p className="text-sm font-bold">{result.rec}</p>
            </div>
          )}
          {result && !result.error && (
            <ContactRow waHref={waLink(waText)}/>
          )}
        </div>
      );
    };

    /* ── Lumen Calculator ── */
    const LumenCalc = ({ preset, onGoToLinear, onGoBack, fromLabel }) => {
      const [room,   setRoom]   = useState('סלון');
      const [width,  setWidth]  = useState('');
      const [length, setLength] = useState('');
      const [height, setHeight] = useState('2.7');

      // כשמגיע preset מהמחשבון הביולוגי — מגדיר חדר אוטומטית
      useEffect(() => {
        if (preset) setRoom(preset);
      }, [preset]);

      const ROOMS = [
        { name: 'סלון',     lux: 150, cu: 0.70 },
        { name: 'מטבח',     lux: 300, cu: 0.65 },
        { name: 'חדר שינה', lux: 100, cu: 0.70 },
        { name: 'משרד',     lux: 500, cu: 0.70 },
        { name: 'מסדרון',   lux: 100, cu: 0.60 },
        { name: 'אמבטיה',   lux: 200, cu: 0.60 },
        { name: 'חנות',     lux: 500, cu: 0.65 },
        { name: 'מחסן',     lux: 150, cu: 0.60 },
      ];

      const calc = () => {
        const W = parseFloat(width), L = parseFloat(length), H = parseFloat(height);
        if (!W || !L || !H) return null;
        const area = +(W * L).toFixed(1);
        const r = ROOMS.find(r => r.name === room);
        const totalLm = Math.ceil(r.lux * area / (r.cu * 0.8));
        const spacing = +(H * 0.75).toFixed(1);
        return { lux: r.lux, totalLm, spacing, area };
      };

      const result = calc();

      const waText = result
        ? `💡 חישוב תאורה — LEDLink\n──────────────────────\n🏠 חדר: ${room} | ${width}×${length} מ׳ (${result.area} מ"ר) | גובה: ${height} מ׳\n📊 דרישה: ${result.lux} לוקס (תקן EN 12464)\n✨ סה"כ לומן נדרש: ${result.totalLm.toLocaleString()} lm\n📐 ריווח מומלץ: ${result.spacing} מ׳\n\nאשמח לקבל המלצה מדויקת לחלל`
        : '';

      return (
        <div className="bg-white rounded-lg border border-border p-6 mb-6">
          {/* כפתור חזרה */}
          {onGoBack && (
            <button onClick={onGoBack}
              className="flex items-center gap-1 text-xs font-bold mb-4 transition-colors"
              style={{color:'#E8A020', background:'none', border:'none', cursor:'pointer', padding:0}}>
              ▶ חזרה ל{fromLabel}
            </button>
          )}
          <div className="flex items-center gap-3 mb-5">
            <div className="w-10 h-10 bg-yellow-100 rounded-lg flex items-center justify-center text-xl">💡</div>
            <div>
              <h3 className="font-black text-lg text-ink">מחשבון לומן לחלל</h3>
              <p className="text-xs text-muted">דרישת תאורה מקצועית לפי תקן EN 12464</p>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-4 mb-4">
            <div className="col-span-2">
              <label className="block text-xs font-bold text-ink mb-1">סוג חדר</label>
              <div className="flex flex-wrap gap-2">
                {ROOMS.map(r => (
                  <button key={r.name} onClick={() => setRoom(r.name)}
                    className={`px-3 py-1.5 rounded border text-xs font-bold transition-all ${room === r.name ? 'bg-ink text-white border-ink' : 'border-border text-ink hover:border-gold'}`}>
                    {r.name}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <label className="block text-xs font-bold text-ink mb-1">רוחב חדר (מ׳)</label>
              <input type="number" value={width} onChange={e=>setWidth(e.target.value)} placeholder="לדוגמה: 4"
                className="w-full border border-border rounded px-3 py-2 text-sm"/>
            </div>
            <div>
              <label className="block text-xs font-bold text-ink mb-1">אורך חדר (מ׳)</label>

    };

    /* ── ROI / Energy Saving Calculator ── */
    const ROICalc = () => {
      const [fixtures, setFixtures] = useState('');
      const [oldWatt,  setOldWatt]  = useState('');
      const [newWatt,  setNewWatt]  = useState('');
      const [hours,    setHours]    = useState('8');
      const [rate,     setRate]     = useState('0.65');
      const [invest,   setInvest]   = useState('');
      const calc = () => {
        const N = parseFloat(fixtures), Wo = parseFloat(oldWatt), Wn = parseFloat(newWatt);
        const H = parseFloat(hours), R = parseFloat(rate), Inv = parseFloat(invest) || 0;
        if (!N || !Wo || !Wn || !H || !R) return null;
        const costOld = N * Wo * H * 365 * R / 1000;
        const costNew = N * Wn * H * 365 * R / 1000;
        const saving  = costOld - costNew;
        const payback = Inv > 0 ? (Inv / (saving / 12)).toFixed(1) : null;
        return { costOld: costOld.toFixed(0), costNew: costNew.toFixed(0), saving: saving.toFixed(0), payback, savePct: ((saving/costOld)*100).toFixed(0) };
      };

      const result = calc();

      const waText = result
        ? `♻️ חישוב חיסכון אנרגיה — LEDLink\n──────────────────────\n🔴 לפני: ${fixtures} גופים × ${oldWatt}W — עלות שנתית: ₪${parseInt(result.costOld).toLocaleString()}\n🟢 אחרי LED: ${fixtures} גופים × ${newWatt}W — עלות שנתית: ₪${parseInt(result.costNew).toLocaleString()}\n\n💰 חיסכון שנתי: ₪${parseInt(result.saving).toLocaleString()} (${result.savePct}%)${result.payback ? `\n📅 החזר השקעה: ${result.payback} חודשים` : ''}\n\nאשמח לקבל הצעת מחיר לשדרוג LED`
        : '';

      return (
        <div className="bg-white rounded-lg border border-border p-6 mb-6">
          <div className="flex items-center gap-3 mb-5">
            <div className="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center text-xl">♻️</div>
            <div>
              <h3 className="font-black text-lg text-ink">מחשבון חיסכון אנרגיה</h3>

            </div>
          </div>
          <div className="grid grid-cols-2 gap-4 mb-4">

                className="w-full border border-border rounded px-3 py-2 text-sm"/>
            </div>
            <div>
              <label className="block text-xs font-bold text-ink mb-1">ואט נוכחי לגוף</label>
              <input type="number" value={oldWatt} onChange={e=>setOldWatt(e.target.value)} placeholder="לדוגמה: 60"
                className="w-full border border-border rounded px-3 py-2 text-sm"/>
            </div>
            <div>
              <label className="block text-xs font-bold text-ink mb-1">ואט LED חדש לגוף</label>
              <input type="number" value={newWatt} onChange={e=>setNewWatt(e.target.value)} placeholder="לדוגמה: 9"
                className="w-full border border-border rounded px-3 py-2 text-sm"/>
            </div>
            <div>
              <label className="block text-xs font-bold text-ink mb-1">שעות שימוש ביום</label>
              <input type="number" value={hours} onChange={e=>setHours(e.target.value)}
                className="w-full border border-border rounded px-3 py-2 text-sm"/>

              <label className="block text-xs font-bold text-ink mb-1">תעריף חשמל (₪/קוט"ש)</label>
              <input type="number" value={rate} onChange={e=>setRate(e.target.value)} step="0.01"
                className="w-full border border-border rounded px-3 py-2 text-sm"/>
            </div>
            <div>
              <label className="block text-xs font-bold text-ink mb-1">עלות השקעה (₪) — אופציונלי</label>
              <input type="number" value={invest} onChange={e=>setInvest(e.target.value)} placeholder="לחישוב החזר"
                className="w-full border border-border rounded px-3 py-2 text-sm"/>
            </div>
          </div>
          {result && (
            <>
              <div className="bg-green-50 border border-green-200 rounded-lg p-4 mb-4">
                <div className="grid grid-cols-3 gap-3 text-center mb-3">
                  <div className="bg-white rounded p-2 border border-green-200">
                    <p className="text-xs text-muted mb-1">לפני</p>
                    <p className="font-black text-ink">₪{parseInt(result.costOld).toLocaleString()}</p>
                    <p className="text-xs text-muted">לשנה</p>
                  </div>
                  <div className="bg-white rounded p-2 border border-green-200">
                    <p className="text-xs text-muted mb-1">אחרי LED</p>
                    <p className="font-black text-green-700">₪{parseInt(result.costNew).toLocaleString()}</p>
                    <p className="text-xs text-muted">לשנה</p>

                  <div className="bg-green-600 rounded p-2 text-white">
                    <p className="text-xs opacity-80 mb-1">חיסכון</p>
                    <p className="font-black">₪{parseInt(result.saving).toLocaleString()}</p>
                    <p className="text-xs opacity-80">{result.savePct}% פחות</p>
                  </div>
                </div>
                {result.payback && <p className="text-sm text-green-800 font-bold text-center">📅 החזר השקעה תוך {result.payback} חודשים</p>}

              <ContactRow waHref={waLink(waText)}/>

          )}
        </div>
      );
    };

    /* ── Beam Angle Calculator — Linear Fixture ── */
    const BeamLinearCalc = () => {
      const [height,  setHeight]  = useState('');
      const [angle,   setAngle]   = useState('');
      const [length,  setLength]  = useState('');
      const [surface, setSurface] = useState('רצפה');

      const NARROW   = [10, 24, 36];
      const WIDE     = [60, 90, 110, 120];
      const SURFACES = [
        { label: 'רצפה',         offset: 0.00, note: '' },
        { label: 'שולחן אוכל',   offset: 0.75, note: '−75 ס"מ' },
        { label: 'אי מטבח',      offset: 0.90, note: '−90 ס"מ' },
        { label: 'משטח עבודה',   offset: 0.75, note: '−75 ס"מ' },
        { label: 'קיר',           offset: 0.00, note: '' },
      ];

      const calc = () => {
        const H = parseFloat(height), A = parseFloat(angle);
        if (!H || !A || A <= 0 || A >= 180) return null;
        const surfaceObj  = SURFACES.find(s => s.label === surface) || SURFACES[0];
        const effectiveH  = +(H - surfaceObj.offset).toFixed(2);
        if (effectiveH <= 0) return { error: true, effectiveH, offset: surfaceObj.offset };
        const width   = +(2 * effectiveH * Math.tan((A / 2) * Math.PI / 180)).toFixed(2);
        const spacing = +(width * 0.8).toFixed(2);
        const L       = parseFloat(length);
        const area    = (L && L > 0) ? +(width * L).toFixed(2) : null;
        return { width, spacing, area, effectiveH, offset: surfaceObj.offset };
      };

      const result = calc();

      const waText = (result && !result.error)
        ? `📏 חישוב פיזור אלומה ליניארי — LEDLink\n──────────────────────\n📐 גובה מקור: ${height}מ׳ | משטח: ${surface}${result.offset > 0 ? ` (אפקטיבי: ${result.effectiveH}מ׳)` : ''} | זווית: ${angle}°${length ? ` | אורך גוף: ${length}מ׳` : ''}\n\nתוצאה: רצועת אור ברוחב ${result.width}מ׳${result.area ? ` | שטח מואר: ${result.area}מ"ר` : ''}\nריווח מומלץ בין גופים מקביליים: ${result.spacing}מ׳\n\nאשמח לקבל המלצה על גוף ליניארי מתאים`
        : '';

      const activePreset = [...NARROW, ...WIDE].includes(Number(angle)) ? Number(angle) : null;

      return (
        <div className="bg-white rounded-lg border border-border p-6 mb-6">
          <div className="flex items-center gap-3 mb-5">
            <div className="w-10 h-10 rounded-lg flex items-center justify-center text-xl" style={{background:'rgba(232,160,32,0.12)'}}>📏</div>
            <div>
              <h3 className="font-black text-lg text-ink">מחשבון פיזור אלומה — גוף ליניארי</h3>
              <p className="text-xs text-muted">פרופיל LED, פנדנט, בטן, גוף מסלול — רוחב רצועת האור</p>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-4 mb-4">
            <div>
              <label className="block text-xs font-bold text-ink mb-1">גובה מקור האור מהרצפה (מ׳)</label>
              <input type="number" value={height} onChange={e=>setHeight(e.target.value)} placeholder="לדוגמה: 2.5"
                className="w-full border border-border rounded px-3 py-2 text-sm"/>
            </div>
            <div>
              <label className="block text-xs font-bold text-ink mb-1">אורך הגוף (מ׳) — אופציונלי</label>
              <input type="number" value={length} onChange={e=>setLength(e.target.value)} placeholder="לדוגמה: 1.2"
                className="w-full border border-border rounded px-3 py-2 text-sm"/>
            </div>
            <div className="col-span-2">
              <label className="block text-xs font-bold text-ink mb-1">משטח המטרה (מה מואר)</label>
              <div className="flex flex-wrap gap-2">
                {SURFACES.map(s => (
                  <button key={s.label} onClick={() => setSurface(s.label)}
                    className={`px-3 py-1.5 rounded border text-xs font-bold transition-all ${surface === s.label ? 'bg-ink text-white border-ink' : 'border-border text-ink hover:border-gold'}`}>
                    {s.label}{s.note ? <span style={{fontWeight:400, opacity:0.7}}> {s.note}</span> : ''}
                  </button>
                ))}
              </div>
            </div>
            <div className="col-span-2">
              <label className="block text-xs font-bold text-ink mb-2">זווית אלומה (°)</label>
              <p className="text-xs text-muted mb-1.5">צר — מסלול / וול ווושר / פנדנט עם לוברים</p>
              <div className="flex flex-wrap gap-2 mb-2">
                {NARROW.map(p => (
                  <button key={p} onClick={() => setAngle(String(p))}
                    className={`px-3 py-1.5 rounded border text-xs font-bold transition-all ${activePreset === p ? 'bg-ink text-white border-ink' : 'border-border text-ink hover:border-gold'}`}>
                    {p}°
                  </button>
                ))}
              </div>
              <p className="text-xs text-muted mb-1.5">רחב — פרופיל LED / בטן / פאנל שקוע</p>
              <div className="flex flex-wrap gap-2 mb-2">
                {WIDE.map(p => (
                  <button key={p} onClick={() => setAngle(String(p))}
                    className={`px-3 py-1.5 rounded border text-xs font-bold transition-all ${activePreset === p ? 'bg-ink text-white border-ink' : 'border-border text-ink hover:border-gold'}`}>
                    {p}°
                  </button>
                ))}
              </div>
              <input type="number" value={angle} onChange={e=>setAngle(e.target.value)} placeholder="או הזן ידנית..."
                className="w-full border border-border rounded px-3 py-2 text-sm"/>
            </div>
          </div>
          {result && result.error && (
            <div className="bg-red-50 border border-red-300 rounded-lg p-4 mb-4 text-center">
              <p className="text-sm font-bold text-red-700">⚠️ גובה המשטח ({SURFACES.find(s=>s.label===surface)?.offset}מ׳) גבוה ממיקום הגוף ({height}מ׳)</p>
              <p className="text-xs text-red-500 mt-1">הזן גובה גוף גדול יותר</p>
            </div>
          )}
          {result && !result.error && (
            <>
              <div className="rounded-lg p-5 mb-4 border" style={{background:'rgba(232,160,32,0.08)', borderColor:'#E8A020'}}>
                <p className="text-sm font-bold text-ink mb-1 text-center">
                  בגובה {height}מ׳ עם זווית {angle}° על {surface}:
                </p>
                {result.offset > 0 && (
                  <p className="text-xs text-center mb-3" style={{color:'#C4880A'}}>
                    גובה אפקטיבי לחישוב: {result.effectiveH}מ׳ ({height} − {result.offset} ס"מ מגובה המשטח)
                  </p>
                )}
                <div className={`grid gap-3 text-center ${result.area ? 'grid-cols-3' : 'grid-cols-2'}`}>
                  <div className="bg-white rounded p-3 border border-amber-200">
                    <p className="font-black text-2xl" style={{color:'#E8A020'}}>{result.width}מ׳</p>
                    <p className="text-xs text-muted mt-0.5">רוחב רצועת האור</p>
                  </div>
                  <div className="bg-white rounded p-3 border border-amber-200">
                    <p className="font-black text-2xl text-ink">{result.spacing}מ׳</p>
                    <p className="text-xs text-muted mt-0.5">ריווח בין גופים מקביליים</p>
                  </div>
                  {result.area && (
                    <div className="bg-white rounded p-3 border border-amber-200">
                      <p className="font-black text-2xl" style={{color:'#E8A020'}}>{result.area}מ"ר</p>
                      <p className="text-xs text-muted mt-0.5">שטח מואר כולל</p>
                    </div>
                  )}
                </div>
              </div>
              <ContactRow waHref={waLink(waText)}/>
            </>
          )}
        </div>
      );
    };

    /* ── Biological Calculator (Melanopic Lux) ── */
    const BiologicalCalc = ({ onGoToLumen }) => {
      const [roomType, setRoomType] = useState('office');
      const [lux, setLux] = useState(500);
      const [kelvin, setKelvin] = useState(4000);

      // טבלת הנגזרות לפי טמפרטורה
      const derTable = [
        { k: 2700, d: 0.45 },
        { k: 3000, d: 0.52 },
        { k: 4000, d: 0.65 },
        { k: 5000, d: 0.90 },
        { k: 6500, d: 1.10 }
      ];

      // אינטרפולציה לנגזרת
      const getDer = (k) => {
        for (let i = 0; i < derTable.length - 1; i++) {
          if (k >= derTable[i].k && k <= derTable[i + 1].k) {
            const r = (k - derTable[i].k) / (derTable[i + 1].k - derTable[i].k);
            return derTable[i].d + r * (derTable[i + 1].d - derTable[i].d);
          }
        }
        return k < 2700 ? 0.45 : 1.10;
      };

      const ROOMS = [
        { type: 'office', label: '🏢 משרד / עבודה (ריכוז)', target: 250, name: 'משרד', maxMode: false },
        { type: 'classroom', label: '🎓 כיתה / הדרכה (למידה)', target: 200, name: 'כיתה', maxMode: false },
        { type: 'healthcare', label: '🏥 רפואה (ערנות גבוהה)', target: 250, name: 'רפואה', maxMode: false },
        { type: 'bedroom', label: '🌙 חדר שינה (הרפיה ושינה)', target: 100, name: 'חדר שינה', maxMode: true },
        { type: 'lobby', label: '🏨 לובי / שהייה (איזון)', target: 150, name: 'לובי', maxMode: false },
      ];

      // מיפוי סוג חלל ביולוגי → סוג חדר במחשבון לומן
      const LUMEN_ROOM_MAP = {
        office:     'משרד',
        classroom:  'משרד',
        healthcare: 'משרד',
        bedroom:    'חדר שינה',
        lobby:      'מסדרון',
      };

      const calc = () => {
        const room = ROOMS.find(r => r.type === roomType);
        const effRatio = 1 + ((kelvin - 2700) / (6500 - 2700)) * 0.12;
        const eLux = lux * effRatio;
        const res = Math.round(eLux * getDer(kelvin));
        const factor = (res / (lux * 0.45)).toFixed(1);

        const isSuccess = room.maxMode ? res <= room.target : res >= room.target;
        const glare = eLux >= 800;
        const status = isSuccess && !glare ? 'ok' : 'warning';

        let summary = '';
        if (roomType === 'office') {
          summary = `עוצמה של ${lux} Lux בגוון ${kelvin}K מעניקה ${res} EML — פי ${(res/room.target).toFixed(1)} מהיעד. זה יעיל להגעה לתקן WELL עם פחות גופי תאורה.`;
        } else if (roomType === 'bedroom') {
          summary = `בחדר שינה, ערב עם ${kelvin}K יכול להדכא מלטונין גם ב-${lux} Lux. דיוק ספקטרלי קריטי למניעת הפרעות שינה.`;
        } else if (roomType === 'healthcare') {
          summary = `במערכת בריאות, ${res} EML מחזק ערנות וקוג'ניציה. הבדל של 173% בין גוונים הוא קריטי לתוצאות טיפול.`;
        } else {
          summary = `כיתה/כלתא או לובי: ${res} EML מעניקה איזון בין ערנות ללא עיוות קוגניטיבי. תכנון מבוסס EML הוא ההבדל בין פרויקט בריא לכזה שנכשל בתקן WELL.`;
        }

        return { eml: res, target: room.target, factor, summary, isSuccess, glare, status, eLux, room };
      };

      const result = calc();

      return (
        <div className="bg-white rounded-lg border border-border p-6 mb-6">
          <div className="flex items-center gap-3 mb-5">
            <div className="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center text-xl">🌙</div>
            <div>
              <h3 className="font-black text-lg text-ink">מחשבון ביולוגי (Melanopic Lux)</h3>
              <p className="text-xs text-muted">השפעה בריאותית של אור על הקצב היומי — CIE S 026:2018</p>
            </div>
          </div>

          <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-5">
            <strong className="text-blue-900 block mb-2">🧬 מלטונין והשעון הביולוגי:</strong>
            <p className="text-sm text-blue-800">מלטונין הוא הורמון המשרה שינה. אור קר (כחול) עוצר את הייצור שלו וגורם לערנות שיא. אור חם מאפשר לגוף להפריש מלטונין ולנוח.</p>
          </div>

          <div className="grid grid-cols-1 gap-4 mb-4">
            <div>
              <label className="block text-xs font-bold text-ink mb-2">סוג החלל:</label>
              <select value={roomType} onChange={e => setRoomType(e.target.value)}
                className="w-full border border-border rounded px-3 py-2 text-sm bg-white">
                {ROOMS.map(r => <option key={r.type} value={r.type}>{r.label}</option>)}
              </select>
            </div>
            <div>
              <div className="flex justify-between items-center mb-2">
                <label className="text-xs font-bold text-ink">עוצמת הארה (Lux):</label>
                <span className="text-sm font-bold" style={{ color: result.glare ? '#ff6b6b' : '#1C1C1C' }}>{lux}</span>
              </div>
              <input type="range" min="50" max="1000" step="10" value={lux} onChange={e => setLux(Number(e.target.value))}
                className="w-full" style={{cursor:'pointer'}}/>
              <div className="flex justify-between text-xs text-muted mt-1">
                <span>50</span><span>1000</span>
              </div>
            </div>
            <div>
              <div className="flex justify-between items-center mb-2">
                <label className="text-xs font-bold text-ink">גוון אור (Kelvin):</label>
                <span className="text-sm font-bold" style={{ color: '#E8A020' }}>{kelvin}K</span>
              </div>
              <input type="range" min="2700" max="6500" step="100" value={kelvin} onChange={e => setKelvin(Number(e.target.value))}
                className="w-full" style={{cursor:'pointer'}}/>
              <div className="flex justify-between text-xs text-muted mt-1">
                <span>🟠 2700K (חם)</span><span>🔵 6500K (קר)</span>
              </div>

    /* ── Linear Profile Calculator ── */
    const LinearLengthCalc = ({ preset, onGoBack, fromLabel }) => {

        { name: 'מסדרון',   lux: 100 },
        { name: 'חנות',     lux: 500 },

        const W = parseFloat(width), L = parseFloat(length);

        const totalLm      = (room.lux * area) / (0.7 * 0.8);
        const effectiveLmM = profile.lmM * 0.70;          // ניכוי 30% הפסדי דיפוזר
        const meters       = +(totalLm / effectiveLmM).toFixed(1);
        const watt     = Math.ceil(meters * profile.wM);
        const efficacy = (profile.lmM / profile.wM).toFixed(0);
        return { meters, watt, efficacy, lux: room.lux, area };
      };

      const result = calc();

      const waText = result
        ? `🔆 מחשבון פרופיל LED ליניארי — LEDLink\n──────────────────────\n🏠 חלל: ${roomType} | ${width}×${length} מ׳ (${result.area} מ"ר)\n💡 יעד: ${result.lux} לוקס | פרופיל: ${PROFILES[profileIdx].label} (${PROFILES[profileIdx].sub})\n\n📏 אורך נדרש: ${result.meters} מ׳\n⚡ הספק: ${result.watt}W\n✨ נצילות: ${result.efficacy} Lm/W\n\nאשמח לקבל הצעת מחיר לפרופיל LED מתאים`

              <h3 className="font-black text-lg text-ink">מחשבון פרופיל LED ליניארי</h3>

            </div>
          </div>

          {/* ─ Info box ─ */}

                  <p className="font-black text-2xl text-ink">{result.watt}W</p>
                  <p className="text-xs text-muted mt-0.5">הספק ספק כוח</p>
                </div>
                <div className="bg-white rounded p-3 border border-amber-200 text-center">
                  <p className="font-black text-2xl" style={{color:'#E8A020'}}>{result.efficacy} <span className="text-sm">Lm/W</span></p>
                  <p className="text-xs text-muted mt-0.5">נצילות אנרגטית</p>

                  מומלץ לחלק את {result.meters}מ׳ למספר גופים לאחידות מקסימלית ומניעת שטחים מתים בפינות החדר.

        </div>
      );
    };

    /* ── Power Supply Calculator ── */
    const PowerSupplyCalc = () => {
      const [load, setLoad]   = useState('100');
      const [volt, setVolt]   = useState('24');

      const INVENTORY = [25, 50, 75, 100, 150, 200, 350];

      const calc = () => {
        const W = parseFloat(load), V = parseFloat(volt);
        if (!W || W <= 0) return null;
        const safety = +(W * 1.2).toFixed(0);
        let recommended = null;
        for (let w of INVENTORY) {
          if (w >= safety) { recommended = w; break; }
        }
        const split = recommended === null;
        if (split) recommended = INVENTORY[INVENTORY.length - 1];
        const current     = (W / V).toFixed(2);
        const utilization = Math.round((W / recommended) * 100);
        return { recommended, split, safety, current, utilization };
      };

      const result = calc();

      const waText = result
        ? `🔌 התאמת ספק כוח — LEDLink\n──────────────────────\n⚡ עומס מחושב: ${load}W ב-${volt}V\n✅ ספק נדרש מהמלאי: ${result.split ? 'נדרש פיצול (מעל 350W)' : result.recommended + 'W'}\n🔌 זרם עבודה: ${result.current}A\n\nאשמח לקבל הצעת מחיר בהתאם למפרט.`
        : '';

      return (
        <div className="bg-white rounded-lg border border-border p-6 mb-6">

          {/* ─ Header ─ */}
          <div className="flex items-center gap-3 mb-5">
            <div className="w-10 h-10 rounded-lg flex items-center justify-center text-xl" style={{background:'rgba(232,160,32,0.12)'}}>🔌</div>
            <div>
              <h3 className="font-black text-lg text-ink">מחשבון התאמת ספק כוח</h3>

            </div>
          </div>

          {/* ─ Info box ─ */}
          <div className="rounded-lg p-4 mb-5 border" style={{background:'rgba(232,160,32,0.07)', borderColor:'rgba(232,160,32,0.35)'}}>

            <p className="text-sm text-muted leading-relaxed">
              מזין עומס תאורה ומתח עבודה — המחשבון מוצא את ספק הכוח המתאים ממלאי LEDLink עם מקדם בטיחות 120%.
            </p>
          </div>

          <div className="grid grid-cols-2 gap-4 mb-5">
            <div>
              <label className="block text-xs font-bold text-ink mb-1">עומס תאורה (W)</label>
              <input type="number" value={load} onChange={e => setLoad(e.target.value)} placeholder="לדוגמה: 100"
                className="w-full border border-border rounded px-3 py-2 text-sm"/>
            </div>
            <div>
              <label className="block text-xs font-bold text-ink mb-1">מתח עבודה (DC)</label>
              <select value={volt} onChange={e => setVolt(e.target.value)}
                className="w-full border border-border rounded px-3 py-2 text-sm">
                <option value="12">12V DC</option>
                <option value="24">24V DC</option>
                <option value="48">48V DC</option>
              </select>
            </div>
          </div>

          {/* ─ Result ─ */}
          {result && (
            <div className="rounded-lg p-5 mb-4 border" style={{background:'rgba(232,160,32,0.08)', borderColor:'#E8A020'}}>
              <p className="text-xs text-muted text-center mb-1">ספק כוח מומלץ מהמלאי</p>
              {result.split ? (
                <p className="font-black text-center mb-1" style={{fontSize:36, lineHeight:1.2, color:'#E8A020'}}>נדרש פיצול</p>
              ) : (
                <p className="font-black text-center mb-1" style={{fontSize:52, lineHeight:1.1, color:'#E8A020'}}>
                  {result.recommended}<span style={{fontSize:22, fontWeight:700}}>W</span>
                </p>
              )}
              <p className="text-xs text-center text-muted mb-4">עומס בטיחות מחושב: {result.safety}W (×1.2)</p>

              <div className="grid grid-cols-2 gap-3 mb-4">
                <div className="bg-white rounded p-3 border border-amber-200 text-center">
                  <p className="font-black text-2xl text-ink">{result.current}A</p>
                  <p className="text-xs text-muted mt-0.5">זרם עבודה</p>
                </div>
                <div className="bg-white rounded p-3 border border-amber-200 text-center">
                  <p className="font-black text-2xl" style={{color:'#E8A020'}}>{result.utilization}%</p>
                  <p className="text-xs text-muted mt-0.5">ניצולת ספק</p>
                </div>
              </div>

              {result.split && (
                <div className="bg-white rounded p-3 border border-amber-200">
                  <p className="text-xs font-bold text-ink mb-1">⚠️ עומס חורג ממקסימום:</p>
                  <p className="text-xs text-muted leading-relaxed">
                    עומס הבטיחות ({result.safety}W) עולה על הספק הגבוה במלאי (350W). יש לפצל לשני ספקים או יותר.
                  </p>
                </div>
              )}
            </div>
          )}

          {/* ─ Contact ─ */}
          <ContactRow waHref={result ? waLink(waText) : undefined} disabled={!result}/>

          <p className="text-center text-xs text-muted mt-4 uppercase tracking-wider">INVENTORY-BASED SPECIFICATION | LEDLink</p>
        </div>
      );
    };

    /* ── SVG Icons ── */
    const Ic = ({ size=16, children }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
           stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"
           style={{flexShrink:0, display:'block'}}>

    );
    const IcVoltage   = ({s=16}) => <Ic size={s}><path d="m13 2-10 12h9l-1 8 10-12h-9l1-8z"/></Ic>;
    const IcLumen     = ({s=16}) => <Ic size={s}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></Ic>;
    const IcRoi       = ({s=16}) => <Ic size={s}><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></Ic>;
    const IcBeam      = ({s=16}) => <Ic size={s}><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></Ic>;
    const IcCircadian = ({s=16}) => <Ic size={s}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></Ic>;
    const IcLinear    = ({s=16}) => <Ic size={s}><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></Ic>;
    const IcPower     = ({s=16}) => <Ic size={s}><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></Ic>;

    /* ── Main App ── */
    const TOOLS = [
      { id: 'voltage',     label: 'מפל מתח',       Icon: IcVoltage   },
      { id: 'lumen',       label: 'לומן לחלל',      Icon: IcLumen     },
      { id: 'roi',         label: 'חיסכון אנרגיה',  Icon: IcRoi       },
      { id: 'beam-linear', label: 'פיזור אלומה',     Icon: IcBeam      },
      { id: 'circadian',   label: 'מחשבון ביולוגי', Icon: IcCircadian },
      { id: 'linear',      label: 'פרופיל LED',      Icon: IcLinear    },
      { id: 'power',       label: 'ספק כוח',         Icon: IcPower     },
    ];

    const App = () => {
      const [tool, setTool] = useState(() => {
        const t = new URLSearchParams(window.location.search).get('tool');
        return t || 'voltage';
      });
      const [openDrop, setOpenDrop] = useState(null);
      const [menuOpen, setMenuOpen] = useState(false);
      const [lumenPreset,  setLumenPreset]  = useState(null);
      const [linearPreset, setLinearPreset] = useState(null);
      const tabsRef = React.useRef(null);

      const goToTool = (id) => {
        setTool(id);
        const url = new URL(window.location.href);
        url.searchParams.set('tool', id);
        window.history.pushState({ tool: id }, '', url.toString());
      };

      // גלילת טאב פעיל לתצוגה במובייל
      React.useEffect(() => {
