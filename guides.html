            </div>
          </footer>

          {openGuide && <GuideArticle guide={openGuide} onClose={()=>setOpenGuide(null)}/>}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
